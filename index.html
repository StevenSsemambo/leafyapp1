<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0b1410"/>
<title>Leafy – by Sematech Developers</title>

<!-- ═══════════════════════════════════════════════════════════════
     STEP 1 OF 2 — THEME BOOT (must be first script, before CSS)
     Restores saved theme & accent so there is zero flash on reload
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function(){
  try {
    var t = localStorage.getItem('leafy-theme');
    if (t === 'light') document.documentElement.setAttribute('data-theme','light');
    var a = localStorage.getItem('leafy-accent');
    if (a) document.documentElement.style.setProperty('--accent', a);
  } catch(e) {}
})();
</script>
<meta name="apple-mobile-web-app-title" content="Leafy"/>
<meta name="application-name" content="Leafy"/>
<meta name="description" content="Leafy – Secure, beautiful messaging by Sematech Developers"/>
<!-- Inline SVG leaf icon as data URI for PWA -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230b1410'/%3E%3Cpath d='M32 8 C32 8 14 18 14 34 C14 44 22 52 32 52 C32 52 32 36 44 24 C38 32 32 52 32 52 C42 52 50 44 50 34 C50 20 32 8 32 8Z' fill='%2322c55e'/%3E%3Cpath d='M32 52 C32 52 30 38 22 30' stroke='%234ade80' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230b1410'/%3E%3Cpath d='M90 22 C90 22 38 50 38 96 C38 124 62 148 90 148 C90 148 90 100 124 68 C106 90 90 148 90 148 C118 148 142 124 142 96 C142 56 90 22 90 22Z' fill='%2322c55e'/%3E%3Cpath d='M90 148 C90 148 84 106 62 84' stroke='%234ade80' stroke-width='4' fill='none' stroke-linecap='round'/%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#22c55e;--accent-bright:#4ade80;--accent-dim:#16a34a;
  --accent-glow:rgba(34,197,94,0.18);--accent-glow-strong:rgba(34,197,94,0.32);
  --bg-void:#060c08;--bg-deep:#0b1410;--bg-base:#0f1a12;--bg-raised:#162118;
  --bg-card:#1c2b1e;--bg-hover:#243226;--bg-active:#2c3d2f;--bg-input:#172019;
  --glass-bg:rgba(22,33,24,0.85);--glass-border:rgba(34,197,94,0.12);--glass-blur:blur(20px);
  --border-subtle:rgba(34,197,94,0.07);--border-default:rgba(34,197,94,0.13);
  --border-strong:rgba(34,197,94,0.24);--border-accent:rgba(34,197,94,0.5);
  --text-primary:#e6f4e8;--text-secondary:#94b898;--text-muted:#526856;--text-placeholder:#384d3b;
  --shadow-sm:0 1px 4px rgba(0,0,0,.5);--shadow-md:0 4px 20px rgba(0,0,0,.6);--shadow-lg:0 8px 40px rgba(0,0,0,.7);
  --shadow-glow:0 0 24px var(--accent-glow);--shadow-glow-strong:0 0 32px var(--accent-glow-strong);
  --radius-xs:5px;--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:22px;--radius-2xl:28px;--radius-full:9999px;
  --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --sidebar-w:300px;--panel-w:272px;--header-h:58px;--t:0.22s cubic-bezier(0.4,0,0.2,1);--t-spring:0.35s cubic-bezier(0.34,1.56,0.64,1);--t-smooth:0.28s cubic-bezier(0.25,0.46,0.45,0.94);
  --msg-pad:10px 14px;--msg-gap:3px;--avatar-size:40px;--avatar-sm:30px;--conv-pad:10px;--font-msg:14px;
  --mood:var(--accent);--mood-glow:var(--accent-glow);
  --brightness:1;
  --font-size-scale:1;
  --bubble-radius:var(--radius-lg);
}
[data-theme="light"]{
  --bg-void:#dfeee1;--bg-deep:#e4ece5;--bg-base:#eaf2eb;--bg-raised:#dce8dd;
  --bg-card:#f0f7f1;--bg-hover:#d4e5d6;--bg-active:#c8dcca;--bg-input:#e2ede3;
  --glass-bg:rgba(240,247,241,0.88);--border-subtle:rgba(34,197,94,0.12);
  --border-default:rgba(34,197,94,0.2);--border-strong:rgba(34,197,94,0.32);
  --text-primary:#1a2e1c;--text-secondary:#3a5e3d;--text-muted:#6a8e6d;--text-placeholder:#94b898;
  --shadow-sm:0 1px 4px rgba(0,0,0,.08);--shadow-md:0 4px 20px rgba(0,0,0,.1);--shadow-lg:0 8px 40px rgba(0,0,0,.12);
}
/* Brightness overlay */
body::after{content:'';position:fixed;inset:0;background:rgba(0,0,0,calc(1 - var(--brightness)));pointer-events:none;z-index:9998;transition:background 0.3s ease}

[data-mood="ocean"]{--mood:#0ea5e9;--mood-glow:rgba(14,165,233,0.18)}
[data-mood="sunset"]{--mood:#f97316;--mood-glow:rgba(249,115,22,0.18)}
[data-mood="lavender"]{--mood:#a855f7;--mood-glow:rgba(168,85,247,0.18)}
[data-mood="rose"]{--mood:#f43f5e;--mood-glow:rgba(244,63,94,0.18)}
[data-mood="gold"]{--mood:#eab308;--mood-glow:rgba(234,179,8,0.18)}
html{height:100%;height:-webkit-fill-available;}
body{height:100%;height:-webkit-fill-available;width:100%;overflow:hidden;font-family:var(--font-body);background:var(--bg-void);color:var(--text-primary);-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:99px}

/* ENHANCED TRANSITIONS */
.sidebar{transition:transform .28s cubic-bezier(0.4,0,0.2,1),opacity .22s ease}
/* conv-item transitions handled in main CSS block below */
@keyframes activeBar{from{height:0;opacity:0}to{opacity:1}}
.message-bubble{transition:border-color .2s ease,box-shadow .2s ease,transform .15s var(--t-spring)}
.message-bubble:hover{transform:scale(1.01);box-shadow:0 2px 12px rgba(0,0,0,.25)}
.icon-btn{transition:background .18s ease,color .18s ease,transform .2s var(--t-spring)}
.icon-btn:active{transform:scale(0.88)}
.tab-btn{transition:all .22s var(--t-smooth)}
.send-btn{transition:transform .25s var(--t-spring),box-shadow .2s ease,background .2s ease,opacity .2s ease}
.reaction-chip{transition:all .22s var(--t-spring)}
.reaction-chip:hover{transform:scale(1.12)}
/* nav-tab transitions handled in main CSS block */
.modal{animation:modalSlideUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes modalSlideUp{from{opacity:0;transform:scale(0.9) translateY(20px)}to{opacity:1;transform:none}}
@keyframes bubbleIn{from{opacity:0;transform:scale(0.85) translateY(8px)}to{opacity:1;transform:none}}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100%;background:var(--glass-bg);backdrop-filter:var(--glass-blur);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;position:relative;z-index:10}

/* ANIMATED CHAT BACKGROUNDS */
.chat-bg-canvas{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.chat-bg-pattern{position:absolute;inset:0;opacity:0.025;background-image:radial-gradient(var(--accent) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0}

/* Falling Leaves */
@keyframes leafFall{0%{transform:translateY(-60px) rotate(0deg) translateX(0);opacity:0}10%{opacity:1}80%{opacity:.8}100%{transform:translateY(110vh) rotate(720deg) translateX(60px);opacity:0}}
@keyframes leafSway{0%,100%{margin-left:0}25%{margin-left:30px}75%{margin-left:-20px}}
.leaf-particle{position:absolute;top:-60px;font-size:14px;animation:leafFall linear infinite,leafSway ease-in-out infinite;will-change:transform}
/* Snow */
@keyframes snowFall{0%{transform:translateY(-20px) rotate(0deg);opacity:0}5%{opacity:.9}90%{opacity:.7}100%{transform:translateY(110vh) rotate(360deg);opacity:0}}
@keyframes snowSway{0%,100%{margin-left:0}50%{margin-left:25px}}
.snow-particle{position:absolute;top:-20px;border-radius:50%;background:rgba(255,255,255,0.85);animation:snowFall linear infinite,snowSway ease-in-out infinite;will-change:transform}
/* Rain */
@keyframes rainFall{0%{transform:translateY(-30px) skewX(-15deg);opacity:0}5%{opacity:.6}100%{transform:translateY(110vh) skewX(-15deg);opacity:0}}
.rain-particle{position:absolute;top:0;width:1.5px;border-radius:2px;background:linear-gradient(to bottom,transparent,rgba(120,200,255,0.7));animation:rainFall linear infinite}
/* Fireflies */
@keyframes fireflyFloat{0%,100%{transform:translate(0,0) scale(1);opacity:.2}25%{transform:translate(40px,-30px) scale(1.3);opacity:1}50%{transform:translate(-20px,-60px) scale(.8);opacity:.5}75%{transform:translate(60px,-20px) scale(1.1);opacity:.9}}
.firefly{position:absolute;width:6px;height:6px;border-radius:50%;background:#ffe566;box-shadow:0 0 8px 3px rgba(255,229,102,0.6);animation:fireflyFloat ease-in-out infinite;will-change:transform}
/* Cherry Blossom */
@keyframes petalFall{0%{transform:translateY(-40px) rotate(0deg);opacity:0}8%{opacity:.85}100%{transform:translateY(110vh) rotate(540deg) translateX(80px);opacity:0}}
.petal-particle{position:absolute;top:-40px;font-size:12px;animation:petalFall linear infinite;will-change:transform}
/* Bubbles */
@keyframes bubbleRise{0%{transform:translateY(110vh) scale(0);opacity:0}10%{opacity:.6}85%{opacity:.4}100%{transform:translateY(-60px) scale(1.2);opacity:0}}
.bubble-particle{position:absolute;border-radius:50%;border:1.5px solid rgba(34,197,94,0.4);background:rgba(34,197,94,0.05);animation:bubbleRise ease-in infinite}
/* Stars */
@keyframes starTwinkle{0%,100%{opacity:.1;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
.star-particle{position:absolute;border-radius:50%;background:#fff;animation:starTwinkle ease-in-out infinite}
/* Sunset rays */
@keyframes rayPulse{0%,100%{opacity:.03}50%{opacity:.09}}
.ray-particle{position:absolute;top:0;left:50%;height:100%;width:60px;transform-origin:top center;background:linear-gradient(to bottom,rgba(249,115,22,0.15),transparent);animation:rayPulse ease-in-out infinite}

/* FONT SIZE SCALING */
body{font-size:calc(14px * var(--font-size-scale))}
.message-bubble{font-size:calc(var(--font-msg) * var(--font-size-scale))}

/* BUBBLE SHAPE VARIANTS */
[data-bubble="round"] .message-bubble{border-radius:var(--radius-xl) !important}
[data-bubble="round"] .message-bubble::after{display:none}
[data-bubble="sharp"] .message-bubble{border-radius:4px !important}
[data-bubble="sharp"] .message-bubble::after{display:none}
[data-bubble="cloud"] .message-bubble{border-radius:18px 18px 18px 4px !important}
[data-bubble="cloud"].message-row.own .message-bubble{border-radius:18px 18px 4px 18px !important}

/* MEMBERS PANEL in chat header */
.members-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;background:var(--bg-raised);border:1px solid var(--border-subtle);cursor:pointer;transition:all .2s var(--t-spring);font-size:11px;color:var(--text-muted)}
.members-chip:hover{background:var(--bg-hover);border-color:var(--border-default);transform:scale(1.05)}

/* SETTINGS RANGE SLIDER */
.settings-range{width:100%;-webkit-appearance:none;appearance:none;height:4px;border-radius:99px;background:var(--bg-raised);border:1px solid var(--border-default);outline:none;cursor:pointer}
.settings-range::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);border:2px solid var(--bg-card);box-shadow:0 0 8px var(--accent-glow);cursor:pointer;transition:transform .2s var(--t-spring)}
.settings-range::-webkit-slider-thumb:active{transform:scale(1.3)}
.settings-range::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--accent);border:2px solid var(--bg-card);box-shadow:0 0 8px var(--accent-glow);cursor:pointer}

/* WALLPAPER SWATCHES */
.bg-swatch{width:52px;height:52px;border-radius:var(--radius-md);cursor:pointer;border:2.5px solid transparent;transition:transform .2s var(--t-spring),border-color .2s ease;display:flex;align-items:center;justify-content:center;font-size:20px;position:relative;overflow:hidden}
.bg-swatch:hover{transform:scale(1.1)}
.bg-swatch.selected{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}

/* SETTINGS TOGGLE SWITCH */
.toggle-switch{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;border-radius:99px;background:var(--bg-raised);border:1px solid var(--border-default);cursor:pointer;transition:background .22s ease}
.toggle-track::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:var(--text-muted);transition:transform .25s var(--t-spring),background .22s ease}
.toggle-switch input:checked + .toggle-track{background:var(--accent);border-color:var(--accent)}
.toggle-switch input:checked + .toggle-track::after{transform:translateX(18px);background:#fff}

/* SECTION TOGGLE */
.settings-section{margin-bottom:18px}
.settings-section h4{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.settings-section h4::before{content:'';display:block;width:3px;height:12px;border-radius:2px;background:var(--accent)}

/* SWIPE TO REPLY */
.message-row{touch-action:pan-y;user-select:none}
.message-row.swiping .message-bubble{transition:transform 0.05s linear !important}
.swipe-reply-icon{position:absolute;top:50%;transform:translateY(-50%);opacity:0;font-size:18px;transition:opacity .15s;pointer-events:none;z-index:10}
.message-row:not(.own) .swipe-reply-icon{left:-32px}
.message-row.own .swipe-reply-icon{right:-32px}
.swipe-reply-icon.show{opacity:1}

/* PINNED MESSAGE BAR */
.pinned-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--bg-raised);border-bottom:1px solid var(--border-subtle);cursor:pointer;flex-shrink:0;z-index:4;position:relative;transition:background .15s}
.pinned-bar:hover{background:var(--bg-hover)}
.pinned-icon{font-size:14px;color:var(--accent);flex-shrink:0}
.pinned-content{flex:1;min-width:0}
.pinned-label{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.4px}
.pinned-text{font-size:12.5px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pinned-close{font-size:13px;color:var(--text-muted);cursor:pointer;padding:4px;border-radius:4px;background:none;border:none;flex-shrink:0}
.pinned-close:hover{color:var(--text-primary);background:var(--bg-active)}
.pinned-msg{outline:2px solid var(--accent) !important;outline-offset:2px}

/* READ RECEIPTS */
.tick{font-size:11px;color:var(--text-muted);margin-left:2px;transition:color .3s ease}
.tick.sent{color:var(--text-muted)}
.tick.delivered{color:var(--text-muted)}
.tick.read{color:var(--accent)}

/* PINNED CONVERSATION */
.conv-section-label{
  display:flex;align-items:center;gap:6px;
  padding:10px 12px 5px;
  font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  color:var(--text-muted);
}
.conv-tick{font-size:10px;color:var(--text-muted);margin-top:1px;display:block;text-align:right;line-height:1}
.conv-tick.delivered{color:var(--text-muted)}
.conv-tick.read{color:var(--accent)}
.conv-item{position:relative}
.pinned-conv-divider{padding:10px 14px 6px;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:8px}.pinned-conv-divider::after{content:'';flex:1;height:1px;background:var(--border-subtle)}
.pinned-conv-divider::after{content:'';flex:1;height:1px;background:var(--border-subtle)}

/* CONTACT CARD MESSAGE */
.contact-card-bubble{display:flex;align-items:center;gap:10px;padding:4px 2px;cursor:pointer;transition:opacity .15s}
.contact-card-bubble:hover{opacity:.85}
.contact-card-info{flex:1;min-width:0}
.contact-card-name{font-weight:700;font-size:13.5px;color:var(--text-primary)}
.contact-card-username{font-size:11.5px;color:var(--accent)}
.contact-card-action{font-size:11px;color:var(--text-muted);margin-top:2px}

/* SWIPE BETWEEN CONVS (mobile) */
.swipe-nav-hint{position:fixed;top:50%;transform:translateY(-50%);width:32px;height:60px;display:flex;align-items:center;justify-content:center;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.25);border-radius:8px;font-size:18px;color:var(--accent);pointer-events:none;z-index:50;opacity:0;transition:opacity .2s}
.swipe-nav-hint.left{left:4px}
.swipe-nav-hint.right{right:4px;transform:translateY(-50%) scaleX(-1)}

/* DESTRUCT TIMER BADGE */
.destruct-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#ef4444;border-radius:99px;padding:2px 8px;font-size:11px;font-weight:600;margin-top:5px}

/* IN-CHAT SEARCH BAR */
.chat-search-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg-deep);border-bottom:1px solid var(--border-subtle);flex-shrink:0;z-index:4;position:relative;animation:slideDown .2s ease both}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.chat-search-bar input{flex:1;background:var(--bg-input);border:1px solid var(--border-default);border-radius:99px;padding:6px 14px;color:var(--text-primary);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color .18s}
.chat-search-bar input:focus{border-color:var(--border-accent)}
.chat-search-bar .csi-count{font-size:11.5px;color:var(--text-muted);white-space:nowrap}
.msg-highlight{background:rgba(234,179,8,.35);border-radius:3px}
.msg-highlight.current{background:rgba(234,179,8,.7);outline:2px solid #eab308}

/* CONVERSATION SWIPE ACTIONS */
.conv-swipe-wrap{position:relative;overflow:hidden;border-radius:var(--radius-lg)}
.conv-actions{position:absolute;right:0;top:0;bottom:0;display:flex;align-items:center;gap:4px;padding-right:8px;opacity:0;transition:opacity .2s}
.conv-action-btn{width:36px;height:36px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:transform .15s}
.conv-action-btn:hover{transform:scale(1.1)}

/* STATUS CREATION MODAL */
.status-color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:12px 0}
.status-color-swatch{width:100%;aspect-ratio:1;border-radius:var(--radius-md);cursor:pointer;border:3px solid transparent;transition:transform .15s,border-color .15s;font-size:22px;display:flex;align-items:center;justify-content:center}
.status-color-swatch:hover{transform:scale(1.1)}
.status-color-swatch.selected{border-color:white;box-shadow:0 0 10px rgba(255,255,255,.3)}

/* DENSITY SETTING */
.density-opt{flex:1;padding:8px 6px;border-radius:var(--radius-md);border:2px solid var(--border-default);background:var(--bg-raised);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:var(--font-body);font-size:11px;color:var(--text-muted);transition:all .2s;font-weight:600}
.density-opt.active{border-color:var(--accent);background:var(--accent-glow);color:var(--accent)}

/* PROFILE EDIT MODAL */
.avatar-edit-ring{padding:3px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-dim));cursor:pointer;display:inline-block}
.avatar-edit-ring:hover{box-shadow:var(--shadow-glow-strong)}

/* MUTE BADGE */
.mute-icon{font-size:11px;color:var(--text-muted);margin-left:3px}

/* SIDEBAR WALLPAPER */
.sidebar-wallpaper{position:absolute;inset:0;pointer-events:none;z-index:0;opacity:0.07;border-radius:inherit}
.sidebar{position:relative}
.sidebar>*:not(.sidebar-wallpaper){position:relative;z-index:1}

/* USER PROFILE CARD */
.profile-card-header{display:flex;flex-direction:column;align-items:center;padding:28px 20px 20px;text-align:center;position:relative}
.profile-card-avatar{width:82px;height:82px;border-radius:50%;border:3px solid var(--accent);box-shadow:0 0 0 6px var(--accent-glow);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:32px;background:linear-gradient(135deg,var(--accent-dim),var(--accent));color:#fff;margin-bottom:14px;flex-shrink:0}
.profile-card-name{font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--text-primary);margin-bottom:3px}
.profile-card-username{font-size:13px;color:var(--accent);font-weight:600;margin-bottom:6px}
.profile-card-bio{font-size:13px;color:var(--text-secondary);max-width:260px;line-height:1.5;margin-bottom:12px}
.profile-card-status{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);background:var(--bg-raised);padding:4px 10px;border-radius:99px;border:1px solid var(--border-subtle)}
.profile-card-status .dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted)}
.profile-card-status.is-online .dot{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.5)}
.profile-info-row{display:flex;align-items:center;gap:10px;padding:12px 18px;border-top:1px solid var(--border-subtle)}
.profile-info-icon{font-size:16px;width:28px;text-align:center;flex-shrink:0}
.profile-info-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;font-weight:700;margin-bottom:1px}
.profile-info-value{font-size:13.5px;color:var(--text-primary);font-weight:500}

/* GROUP ADMIN CONTROLS */
.admin-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(234,179,8,.15);border:1px solid rgba(234,179,8,.3);color:#eab308;border-radius:99px;padding:1px 7px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-left:4px}
.member-row-actions{display:flex;gap:4px;opacity:0;transition:opacity .18s}
.member-row:hover .member-row-actions{opacity:1}

/* UNREAD NOTIF BADGE on bell icon (driven by data) */
.notif-count-badge{position:absolute;top:4px;right:4px;min-width:16px;height:16px;border-radius:99px;background:#ef4444;border:1.5px solid var(--bg-deep);font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;padding:0 3px;pointer-events:none}


/* ── FILE / IMAGE BUBBLES ───────────────────────────────────── */
.file-bubble{display:flex;align-items:center;gap:10px;min-width:180px;padding:4px 2px}
.img-bubble img{max-width:220px;max-height:200px;border-radius:10px;display:block;cursor:zoom-in;object-fit:cover}
.img-bubble{cursor:zoom-in}

/* ── IMAGE VIEWER OVERLAY ───────────────────────────────────── */
#img-viewer{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;cursor:zoom-out}
#img-viewer img{max-width:94vw;max-height:85vh;border-radius:12px;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.6)}
#img-viewer-caption{color:rgba(255,255,255,.6);font-size:13px}
#img-viewer-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}

/* ── EMOJI PICKER ───────────────────────────────────────────── */
.emoji-picker-pop{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--bg-card);border:1px solid var(--border-default);border-radius:var(--radius-xl);padding:10px;box-shadow:var(--shadow-lg);z-index:200;width:300px;animation:popIn .18s ease both}
.emoji-category{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px}
.emoji-cat-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin:6px 0 3px;display:block}
.ep-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;border-radius:6px;transition:transform .15s,background .15s;line-height:1}
.ep-btn:hover{transform:scale(1.25);background:var(--bg-hover)}

/* ── VOICE RECORDER ─────────────────────────────────────────── */
.voice-recorder-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-raised);border-radius:var(--radius-xl);margin-bottom:7px;animation:popIn .2s ease both;border:1px solid var(--border-accent)}
.voice-pulse{width:10px;height:10px;border-radius:50%;background:#ef4444;animation:voicePulse 1s ease-in-out infinite;flex-shrink:0}
@keyframes voicePulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}
.voice-timer{font-family:var(--font-mono);font-size:14px;font-weight:600;color:var(--text-primary);flex:1}
.voice-waveform{display:flex;align-items:center;gap:2px;flex:1}
.voice-bar{width:3px;border-radius:99px;background:var(--accent);animation:waveBar .6s ease-in-out infinite alternate}
.voice-bar:nth-child(2){animation-delay:.1s}.voice-bar:nth-child(3){animation-delay:.2s}.voice-bar:nth-child(4){animation-delay:.3s}.voice-bar:nth-child(5){animation-delay:.4s}.voice-bar:nth-child(6){animation-delay:.15s}.voice-bar:nth-child(7){animation-delay:.25s}
@keyframes waveBar{from{height:4px}to{height:18px}}

/* ── LINK PREVIEW ───────────────────────────────────────────── */
.link-preview{background:var(--bg-raised);border:1px solid var(--border-default);border-radius:var(--radius-md);overflow:hidden;margin-top:6px;cursor:pointer;transition:border-color .18s}
.link-preview:hover{border-color:var(--border-accent)}
.link-preview-body{padding:8px 10px}
.link-preview-domain{font-size:10.5px;color:var(--text-muted);margin-bottom:2px}
.link-preview-title{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:2px;line-height:1.3}
.link-preview-desc{font-size:11.5px;color:var(--text-muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── ONLINE PRESENCE ────────────────────────────────────────── */
.status-dot.online{animation:onlinePulse 2.5s ease-in-out infinite}
@keyframes onlinePulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}50%{box-shadow:0 0 0 3px rgba(34,197,94,0.25)}}

/* ── GROUP INVITE BUTTON ────────────────────────────────────── */
.add-member-btn{width:100%;margin-top:10px;padding:10px;border:2px dashed var(--border-default);border-radius:var(--radius-lg);background:transparent;color:var(--text-muted);cursor:pointer;font-family:var(--font-body);font-size:13px;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px}
.add-member-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}

/* ── FORWARD MESSAGE ────────────────────────────────────────── */
.forward-conv-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--radius-md);cursor:pointer;transition:background .15s}
.forward-conv-item:hover{background:var(--bg-hover)}
.forward-conv-item input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px;cursor:pointer;flex-shrink:0}

/* ── MESSAGE SEARCH HIGHLIGHT ───────────────────────────────── */
.msg-highlight{background:rgba(234,179,8,.35);border-radius:3px}
.msg-highlight.current{background:rgba(234,179,8,.7);outline:2px solid #eab308}

/* ── SPLASH ─────────────────────────────────────────────── */
#splash{
  position:fixed;inset:0;
  background:var(--bg-void);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;gap:0;
  transition:opacity 0.55s ease,transform 0.55s ease;
  overflow:hidden;
}
#splash.hide{opacity:0;pointer-events:none;transform:scale(1.04)}

/* Animated gradient orb behind the logo */
.splash-orb{
  position:absolute;
  width:340px;height:340px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(34,197,94,0.18) 0%,rgba(34,197,94,0.06) 50%,transparent 75%);
  animation:orbPulse 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes orbPulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.12);opacity:1}}

/* Leaf SVG icon */
.splash-leaf-icon{
  width:80px;height:80px;
  background:linear-gradient(145deg,var(--accent),var(--accent-dim));
  border-radius:24px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 40px rgba(34,197,94,0.45),0 8px 32px rgba(0,0,0,0.5);
  animation:splashIconIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both, splashIconPulse 2.8s 0.7s ease-in-out infinite;
  position:relative;z-index:1;
  margin-bottom:22px;
}
@keyframes splashIconIn{from{opacity:0;transform:scale(0.5) rotate(-12deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
@keyframes splashIconPulse{0%,100%{box-shadow:0 0 30px rgba(34,197,94,0.35),0 8px 24px rgba(0,0,0,.5)}50%{box-shadow:0 0 60px rgba(34,197,94,0.6),0 8px 32px rgba(0,0,0,.5)}}

.splash-leaf-svg{width:48px;height:48px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.3))}

.splash-app-name{
  font-family:var(--font-display);
  font-size:48px;font-weight:800;
  color:var(--accent);
  letter-spacing:-1px;
  line-height:1;
  animation:splashNameIn 0.6s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
  position:relative;z-index:1;
  margin-bottom:6px;
}
@keyframes splashNameIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.splash-tagline{
  font-family:var(--font-body);
  font-size:13px;font-weight:400;
  color:var(--text-muted);
  letter-spacing:0.5px;
  animation:splashNameIn 0.6s 0.35s both;
  position:relative;z-index:1;
  margin-bottom:40px;
}

.splash-bar{
  width:160px;height:3px;
  background:var(--border-default);
  border-radius:99px;overflow:hidden;
  animation:splashNameIn 0.6s 0.5s both;
  position:relative;z-index:1;
  margin-bottom:18px;
}
.splash-bar-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent-dim),var(--accent-bright),var(--accent-dim));
  background-size:200% 100%;
  border-radius:99px;
  animation:splashLoad 2s ease-out both, shimmer 1.5s 0.5s ease-in-out infinite;
}
@keyframes splashLoad{from{width:0}to{width:100%}}
@keyframes shimmer{0%,100%{background-position:0% 0%}50%{background-position:100% 0%}}

.splash-dev{
  font-family:var(--font-body);
  font-size:11px;font-weight:600;
  color:var(--text-muted);
  letter-spacing:2px;
  text-transform:uppercase;
  animation:splashNameIn 0.6s 0.6s both;
  position:relative;z-index:1;
}
.splash-dev span{color:var(--accent);opacity:0.85}

/* ═══════════════════════════════════════════════════════════════
   LOGIN SCREEN — split layout on desktop, immersive on mobile
   ═══════════════════════════════════════════════════════════════ */
#login-screen{
  position:fixed;inset:0;
  background:var(--bg-void);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:8000;
  overflow:hidden;
}
#login-screen.show{display:flex}

/* animated mesh background */
.login-bg-orb{
  position:fixed;pointer-events:none;
  width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle at center, rgba(34,197,94,.13) 0%, rgba(34,197,94,.04) 45%, transparent 70%);
  top:-200px;right:-250px;
  animation:orbPulse 6s ease-in-out infinite;
}
.login-bg-orb2{
  position:fixed;pointer-events:none;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle at center, rgba(34,197,94,.08) 0%, transparent 70%);
  bottom:-120px;left:-80px;
  animation:orbPulse 8s 2s ease-in-out infinite;
}
/* subtle dot grid */
#login-screen::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:radial-gradient(rgba(34,197,94,.12) 1px, transparent 1px);
  background-size:28px 28px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
}

.login-card{
  width:100%;max-width:420px;
  animation:loginCardIn 0.5s cubic-bezier(0.34,1.2,0.64,1) both;
  position:relative;z-index:1;
  padding:20px;
}
@keyframes loginCardIn{from{opacity:0;transform:translateY(28px) scale(0.96)}to{opacity:1;transform:none}}

/* brand section */
.login-logo-wrap{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:28px;gap:10px;
}
.login-leaf-icon{
  width:76px;height:76px;
  background:linear-gradient(145deg,var(--accent-bright),var(--accent-dim));
  border-radius:24px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:
    0 0 0 1px rgba(34,197,94,.3),
    0 0 50px rgba(34,197,94,.35),
    0 12px 32px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.2);
  position:relative;
}
.login-leaf-icon::after{
  content:'';position:absolute;inset:0;border-radius:24px;
  background:linear-gradient(145deg,rgba(255,255,255,.15),transparent 60%);
}
.login-app-name{
  font-family:var(--font-display);
  font-size:40px;font-weight:900;
  background:linear-gradient(135deg, var(--accent-bright) 0%, var(--accent) 60%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:-1.5px;line-height:1;
}
.login-app-sub{
  font-size:12.5px;color:var(--text-muted);
  letter-spacing:.5px;margin-top:-2px;
  text-transform:uppercase;font-weight:600;
}

/* form card */
.login-panel{
  background:rgba(15,26,18,.75);
  backdrop-filter:blur(32px) saturate(1.5);
  -webkit-backdrop-filter:blur(32px) saturate(1.5);
  border:1px solid rgba(34,197,94,.14);
  border-radius:24px;
  padding:28px 24px;
  box-shadow:
    0 24px 60px rgba(0,0,0,.6),
    0 1px 0 rgba(255,255,255,.06) inset,
    0 -1px 0 rgba(0,0,0,.3) inset;
}

.login-tabs{
  display:flex;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:3px;
  margin-bottom:22px;
  gap:2px;
}
.login-tab{
  flex:1;padding:8px 12px;
  border-radius:11px;border:none;
  background:transparent;
  color:var(--text-muted);
  font-family:var(--font-body);font-size:13px;font-weight:700;
  cursor:pointer;
  transition:all .22s var(--t-spring);
  letter-spacing:.1px;
}
.login-tab.active{
  background:linear-gradient(145deg,var(--accent),var(--accent-dim));
  color:#fff;
  box-shadow:0 3px 14px rgba(34,197,94,.35),inset 0 1px 0 rgba(255,255,255,.2);
}

.login-field{margin-bottom:14px}
.login-label{
  display:block;font-size:10.5px;font-weight:800;
  color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:7px;
}
.login-input{
  width:100%;
  background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.1);
  border-radius:12px;
  padding:12px 14px;
  color:var(--text-primary);
  font-family:var(--font-body);font-size:14.5px;
  outline:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
}
.login-input::placeholder{color:var(--text-placeholder)}
.login-input:focus{
  border-color:var(--accent);
  background:rgba(34,197,94,.06);
  box-shadow:0 0 0 3px rgba(34,197,94,.15),inset 0 1px 0 rgba(255,255,255,.05);
}
.login-input.error{
  border-color:#ef4444;
  box-shadow:0 0 0 3px rgba(239,68,68,.15);
  animation:inputShake .35s ease;
}
@keyframes inputShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}

.login-btn{
  width:100%;padding:14px;
  border-radius:14px;border:none;
  background:linear-gradient(145deg,var(--accent-bright),var(--accent-dim));
  color:#fff;font-family:var(--font-display);font-size:15px;font-weight:800;
  cursor:pointer;
  letter-spacing:.3px;
  box-shadow:
    0 6px 24px rgba(34,197,94,.45),
    0 2px 8px rgba(0,0,0,.3),
    inset 0 1px 0 rgba(255,255,255,.2);
  transition:transform .22s var(--t-spring),box-shadow .2s ease,filter .2s;
  margin-top:8px;
  position:relative;overflow:hidden;
}
.login-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.18) 0%, transparent 60%);
  pointer-events:none;
}
.login-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 32px rgba(34,197,94,.55),0 4px 12px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.2);
  filter:brightness(1.06);
}
.login-btn:active{transform:scale(0.97)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.login-btn-spinner{
  display:none;
  width:18px;height:18px;
  border:2.5px solid rgba(255,255,255,.35);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}

.login-error-msg{
  font-size:12.5px;color:#ef4444;
  background:rgba(239,68,68,.1);
  border:1px solid rgba(239,68,68,.2);
  border-radius:var(--radius-sm);
  padding:8px 12px;
  margin-bottom:12px;
  display:none;
  animation:loginCardIn .2s ease both;
}

.login-divider{
  display:flex;align-items:center;gap:10px;
  margin:16px 0;color:var(--text-muted);font-size:12px;
}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border-subtle)}

.login-demo-accounts{
  display:flex;flex-direction:column;gap:6px;
}
.demo-account{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;
  background:var(--bg-raised);
  border:1px solid var(--border-subtle);
  border-radius:var(--radius-md);
  cursor:pointer;
  transition:all .18s;
}
.demo-account:hover{background:var(--bg-hover);border-color:var(--border-default);transform:translateX(2px)}
.demo-av{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent-dim),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:12px;color:#fff;flex-shrink:0;
  font-family:var(--font-display);
}
.demo-info{flex:1}
.demo-name{font-size:13px;font-weight:600;color:var(--text-primary)}
.demo-cred{font-size:11px;color:var(--text-muted)}
.demo-arrow{display:flex;align-items:center;color:var(--text-muted);opacity:.6}

.login-footer{
  text-align:center;
  margin-top:18px;
  font-size:11px;color:var(--text-muted);letter-spacing:.2px;
  animation:splashNameIn 0.6s 0.3s both;
  position:relative;z-index:1;
}
.login-footer span{color:var(--accent);font-weight:600}

/* Password visibility toggle */
.input-eye-wrap{position:relative}
.input-eye-wrap .login-input{padding-right:42px}
.eye-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:var(--text-muted);font-size:16px;padding:2px;
  transition:color .15s;
}
.eye-btn:hover{color:var(--text-secondary)}

/* APP */
#app{display:flex;height:100vh;height:100dvh;width:100vw;overflow:hidden;background:var(--bg-void)}

/* SIDEBAR */
/* ═══════════════════════════════════════════════════════════════
   SIDEBAR HEADER, SEARCH & TABS — upgraded
   ═══════════════════════════════════════════════════════════════ */
.sidebar-header{
  height:var(--header-h);display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;flex-shrink:0;position:sticky;top:0;z-index:5;
  background:var(--glass-bg);backdrop-filter:var(--glass-blur);
  border-bottom:1px solid var(--border-subtle);
}
.logo{display:flex;align-items:center;gap:9px;font-family:var(--font-display);font-size:21px;font-weight:800;color:var(--text-primary);letter-spacing:-.6px}
.logo span{background:linear-gradient(120deg,var(--accent-bright),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-icon{
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--accent-bright),var(--accent-dim));
  border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 3px 14px var(--accent-glow);flex-shrink:0;
  transition:transform .22s var(--t-spring),box-shadow .22s ease;
}
.logo-icon:hover{transform:scale(1.1) rotate(-6deg);box-shadow:0 4px 20px var(--accent-glow-strong)}

/* ── Search bar ──────────────────────────────────────────────── */
.sidebar-search{padding:10px 12px 8px;flex-shrink:0}
.search-wrap{position:relative}
.search-icon-pos{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--text-muted);pointer-events:none;font-size:14px;
  transition:color .2s ease;
}
.search-input{
  width:100%;
  background:var(--bg-input);
  border:1.5px solid var(--border-subtle);
  border-radius:14px;
  padding:9px 14px 9px 38px;
  color:var(--text-primary);font-family:var(--font-body);font-size:13px;
  outline:none;
  transition:border-color .22s ease,box-shadow .22s ease,background .22s ease;
}
.search-input::placeholder{color:var(--text-placeholder)}
.search-input:focus{
  border-color:var(--border-accent);
  box-shadow:0 0 0 3px var(--accent-glow),0 3px 14px rgba(0,0,0,.2);
  background:var(--bg-card);
}
.search-input:focus ~ .search-icon-pos,
.search-wrap:focus-within .search-icon-pos{color:var(--accent)}

/* ── Tab bar ─────────────────────────────────────────────────── */
.sidebar-tabs{
  display:flex;padding:4px 12px 10px;gap:3px;flex-shrink:0;
}
.tab-btn{
  flex:1;padding:7px 10px;
  border-radius:10px;border:1px solid transparent;
  background:transparent;color:var(--text-muted);
  font-family:var(--font-body);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .2s var(--t-smooth);
  white-space:nowrap;position:relative;overflow:hidden;
}
.tab-btn::after{
  content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;
  background:var(--accent);border-radius:99px;
  transform:scaleX(0);transition:transform .22s var(--t-spring);
}
.tab-btn.active{
  background:rgba(34,197,94,.1);color:var(--accent);
  border-color:var(--border-accent);font-weight:700;
  box-shadow:0 2px 10px rgba(34,197,94,.12);
}
.tab-btn.active::after{transform:scaleX(1)}
.tab-btn:hover:not(.active){background:var(--bg-hover);color:var(--text-secondary)}
/* ═══════════════════════════════════════════════════════════════
   CONVERSATION LIST — upgraded visuals
   ═══════════════════════════════════════════════════════════════ */
.conversations-list{flex:1;overflow-y:auto;padding:6px 8px 80px;scroll-behavior:smooth}
.conversations-list::-webkit-scrollbar{width:2px}
.conversations-list::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:99px}

/* ── Conv item shell ──────────────────────────────────────────── */
.conv-item{
  display:flex;align-items:center;gap:12px;
  padding:9px 10px;
  border-radius:var(--radius-lg);
  cursor:pointer;position:relative;
  border:1px solid transparent;
  transition:background .18s ease,transform .16s var(--t-spring),box-shadow .18s ease;
  overflow:hidden;
}
.conv-item::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,var(--accent-glow) 0%,transparent 100%);
  opacity:0;transition:opacity .2s ease;pointer-events:none;border-radius:inherit;
}
.conv-item:hover{background:var(--bg-hover);transform:translateX(2px)}
.conv-item:hover::before{opacity:1}
.conv-item:active{transform:scale(0.985)}
.conv-item.active{
  background:linear-gradient(110deg,rgba(34,197,94,.09) 0%,rgba(34,197,94,.03) 100%);
  border-color:var(--border-default);
  box-shadow:inset 0 0 0 1px rgba(34,197,94,.1), 0 2px 16px rgba(0,0,0,.18);
}
.conv-item.active::before{opacity:0}

/* active left bar */
.conv-item.active::after{
  content:'';position:absolute;left:0;top:16%;bottom:16%;
  width:3px;background:linear-gradient(to bottom,var(--accent-bright),var(--accent));
  border-radius:0 3px 3px 0;
  box-shadow:0 0 10px var(--accent-glow);
  animation:activeBar .28s var(--t-spring) both;
}
@keyframes activeBar{from{opacity:0;transform:scaleY(0)}to{opacity:1;transform:scaleY(1)}}

/* ── Avatar ───────────────────────────────────────────────────── */
.av-wrap{position:relative;flex-shrink:0}
.av{
  width:var(--avatar-size);height:var(--avatar-size);border-radius:50%;
  background:var(--bg-card);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;color:var(--accent);
  border:2px solid var(--border-default);
  font-family:var(--font-display);flex-shrink:0;
  box-shadow:0 2px 10px rgba(0,0,0,.4);
  transition:border-color .22s ease,box-shadow .22s ease,transform .2s var(--t-spring);
  overflow:hidden;
}
.av img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block}
.conv-item:hover .av{transform:scale(1.05)}
.conv-item.active .av{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow),0 2px 10px rgba(0,0,0,.4)}
.conv-item:has(.unread-badge:not(.unread-badge-muted)) .av{border-color:var(--accent)}
.av-sm{width:30px!important;height:30px!important;font-size:12px!important}

/* ── Status dot ──────────────────────────────────────────────── */
.status-dot{
  position:absolute;bottom:1px;right:1px;
  width:11px;height:11px;
  border:2px solid var(--bg-deep);border-radius:50%;
  transition:background .3s ease;
}
.status-dot.online{
  background:#22c55e;
  box-shadow:0 0 0 2px rgba(34,197,94,0.25),0 0 8px rgba(34,197,94,0.6);
  animation:onlinePulse 2.8s ease-in-out infinite;
}
.status-dot.away{background:#eab308;box-shadow:0 0 5px rgba(234,179,8,0.5)}
.status-dot.offline{background:var(--bg-raised);border-color:var(--border-strong)}
@keyframes onlinePulse{
  0%,100%{box-shadow:0 0 0 2px rgba(34,197,94,0.2),0 0 6px rgba(34,197,94,0.4)}
  50%{box-shadow:0 0 0 4px rgba(34,197,94,0.08),0 0 12px rgba(34,197,94,0.65)}
}

/* ── Conv info (centre column) ──────────────────────────────── */
.conv-info{flex:1;min-width:0}
.conv-name-row{display:flex;align-items:center;gap:5px;overflow:hidden;margin-bottom:3px}
.conv-name{
  font-size:14px;font-weight:600;color:var(--text-primary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.15px;
  line-height:1.25;
}
.conv-item:has(.unread-badge:not(.unread-badge-muted)) .conv-name{font-weight:750;color:#fff}
.conv-name-row .conv-name{flex:1;min-width:0}

.conv-preview{
  font-size:12.5px;color:var(--text-muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.35;display:flex;align-items:center;gap:4px;
}
.conv-item:has(.unread-badge:not(.unread-badge-muted)) .conv-preview{
  color:var(--text-secondary);font-weight:500;
}
.conv-sender-prefix{color:var(--accent);font-weight:600;font-size:12px;flex-shrink:0}

/* group member count pill */
.conv-group-badge{
  flex-shrink:0;font-size:10px;font-weight:700;
  color:var(--text-muted);background:var(--bg-raised);
  border:1px solid var(--border-subtle);border-radius:99px;
  padding:0 6px;line-height:1.7;letter-spacing:.1px;
}
.has-unread .conv-group-badge{border-color:var(--border-accent);color:var(--accent)}

/* ── Meta column (right) ─────────────────────────────────────── */
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;min-width:46px}
.conv-time-row{display:flex;align-items:center;gap:3px;justify-content:flex-end}
.conv-time{font-size:11px;color:var(--text-muted);font-weight:400;letter-spacing:.1px;white-space:nowrap}
.conv-item:has(.unread-badge:not(.unread-badge-muted)) .conv-time{color:var(--accent);font-weight:700}

/* ── Unread badge  ────────────────────────────────────────────── */
.unread-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:20px;height:20px;padding:0 6px;
  background:var(--accent);color:#fff;
  font-size:11px;font-weight:800;border-radius:99px;
  box-shadow:0 2px 10px rgba(34,197,94,.45),0 0 0 2px rgba(34,197,94,.15);
  animation:badgePop .32s var(--t-spring) both;
  line-height:1;letter-spacing:-.3px;
}
@keyframes badgePop{from{transform:scale(0) rotate(-8deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.unread-badge-muted{
  background:var(--bg-raised) !important;color:var(--text-muted) !important;
  border:1px solid var(--border-default);box-shadow:none !important;
}

/* mute icon */
.mute-icon{color:var(--text-muted);opacity:.55;flex-shrink:0}

/* ── Typing indicator in list ────────────────────────────────── */
.conv-typing-indicator{
  display:inline-flex;align-items:center;gap:5px;
  color:var(--accent);font-weight:500;font-style:italic;font-size:12px;
}
.typing-dots{display:inline-flex;gap:3px;align-items:center}
.typing-dots span{
  width:4px;height:4px;border-radius:50%;background:var(--accent);
  animation:typingBounce 1.2s ease-in-out infinite;opacity:.8;
}
.typing-dots span:nth-child(2){animation-delay:.18s}
.typing-dots span:nth-child(3){animation-delay:.36s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ── Draft badge ─────────────────────────────────────────────── */
.conv-draft-badge{color:#f97316;font-weight:700;font-size:11.5px}
.conv-draft-preview{color:var(--text-muted)}
.sidebar-footer{
  padding:10px 12px;border-top:1px solid var(--border-subtle);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  background:rgba(9,16,11,.8);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  transition:background .2s;
}
.sidebar-footer:hover{background:rgba(15,26,18,.9)}
.own-area{display:flex;align-items:center;gap:10px;flex:1;cursor:pointer;padding:6px 8px;border-radius:var(--radius-md);transition:background .18s ease}.own-area:hover{background:var(--bg-hover)}
.own-name{font-size:13.5px;font-weight:700;color:var(--text-primary);letter-spacing:-.1px}
.own-status{font-size:11.5px;color:var(--text-muted);display:flex;align-items:center;gap:4px}.own-status::before{content:'';width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.6);flex-shrink:0}
.icon-btn{
  width:36px;height:36px;border-radius:10px;border:none;
  background:transparent;color:var(--text-muted);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .18s ease,color .18s ease,transform .18s var(--t-spring),box-shadow .18s;
  -webkit-tap-highlight-color:transparent;flex-shrink:0;
}
.icon-btn:hover{background:var(--bg-hover);color:var(--text-primary);transform:scale(1.06)}
.icon-btn:active{transform:scale(0.9)}
.icon-btn.active{background:var(--accent-glow);color:var(--accent);box-shadow:0 0 0 1px var(--border-accent)}

/* MAIN AREA */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;height:100%;overflow:hidden}

/* STORIES */
.stories-bar{display:flex;gap:10px;padding:10px 14px;overflow-x:auto;border-bottom:1px solid var(--border-subtle);flex-shrink:0;scrollbar-width:none;background:var(--bg-deep);-webkit-overflow-scrolling:touch}
.stories-bar::-webkit-scrollbar{display:none}
.story-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex-shrink:0;transition:transform .18s}
.story-item:hover{transform:scale(1.06)}
.story-ring{padding:2.5px;border-radius:50%;background:conic-gradient(var(--accent),var(--accent-bright),var(--accent))}
.story-ring.viewed{background:var(--border-default)}
.story-inner{background:var(--bg-deep);border-radius:50%;padding:2px;display:flex}
.story-name{font-size:10.5px;color:var(--text-muted);max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.story-add-btn{width:38px;height:38px;border-radius:50%;background:var(--bg-hover);border:2px dashed var(--border-strong);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:20px}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;position:relative;background:var(--bg-base);overflow:hidden}
.chat-bg-pattern{position:absolute;inset:0;opacity:0.025;background-image:radial-gradient(var(--accent) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0}
/* ═══════════════════════════════════════════════════════════════
   CHAT HEADER
   ═══════════════════════════════════════════════════════════════ */
.chat-header{
  height:var(--header-h);display:flex;align-items:center;justify-content:space-between;
  padding:0 10px 0 6px;
  border-bottom:1px solid var(--border-subtle);
  background:var(--glass-bg);backdrop-filter:var(--glass-blur);
  flex-shrink:0;z-index:5;position:relative;
  gap:6px;
}
.chat-header-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;cursor:pointer}
.chat-header-left:active{opacity:.8}
.chat-header-info{flex:1;min-width:0}
.chat-header-info h2{
  font-family:var(--font-display);font-size:15px;font-weight:700;
  color:var(--text-primary);line-height:1.2;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:-.2px;
}
.chat-header-info .sub{
  font-size:11px;color:var(--text-muted);
  display:flex;align-items:center;gap:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-top:1px;
}
.chat-header-info .sub.online-sub{color:var(--accent);font-weight:600}
.chat-header-actions{display:flex;align-items:center;gap:1px;flex-shrink:0}
/* avatar in chat header — slightly larger than conv list */
.chat-header .av{width:36px;height:36px;font-size:13px}
.messages-container{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 8px;display:flex;flex-direction:column;gap:var(--msg-gap);scroll-behavior:smooth;position:relative;z-index:1}
.date-divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--text-muted);font-size:11.5px}
.date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:var(--border-subtle)}
.date-divider span{background:var(--bg-raised);border:1px solid var(--border-subtle);padding:2px 10px;border-radius:99px;white-space:nowrap}
/* ═══════════════════════════════════════════════════════════════
   MESSAGE ROWS & BUBBLES
   ═══════════════════════════════════════════════════════════════ */
.message-row{display:flex;align-items:flex-end;gap:8px;padding:2px 0;position:relative}
.message-row.own{flex-direction:row-reverse}
.msg-av{width:28px;flex-shrink:0;cursor:pointer;align-self:flex-end;margin-bottom:2px}

/* bubble wrap */
.message-bubble-wrap{max-width:68%;display:flex;flex-direction:column}
.message-row.own .message-bubble-wrap{align-items:flex-end}

/* sender name in groups */
.sender-name-row{
  font-size:11px;font-weight:700;color:var(--mood);
  margin-bottom:3px;padding-left:4px;letter-spacing:.1px;
}

/* ── Received bubble ─────────────────────────────────────────── */
.message-bubble{
  background:var(--bg-card);
  border:1px solid var(--border-subtle);
  border-radius:18px 18px 18px 4px;
  padding:var(--msg-pad);
  color:var(--text-primary);
  font-size:var(--font-msg);
  line-height:1.58;
  position:relative;
  word-break:break-word;
  cursor:default;
  animation:bubbleIn 0.26s var(--t-spring) both;
  box-shadow:0 1px 2px rgba(0,0,0,.18),0 2px 8px rgba(0,0,0,.1);
  transition:box-shadow .2s ease;
}
.message-bubble:hover{
  box-shadow:0 2px 8px rgba(0,0,0,.25),0 4px 16px rgba(0,0,0,.12);
}

/* ── Sent bubble ─────────────────────────────────────────────── */
.message-row.own .message-bubble{
  background:linear-gradient(150deg,var(--accent),var(--mood,var(--accent-dim)));
  border-color:transparent;
  color:#fff;
  border-radius:18px 18px 4px 18px;
  box-shadow:0 2px 10px rgba(34,197,94,.3),0 1px 3px rgba(0,0,0,.2);
}
.message-row.own .message-bubble:hover{
  box-shadow:0 4px 16px rgba(34,197,94,.4),0 2px 6px rgba(0,0,0,.2);
}

/* remove CSS triangle tails — border trick looks dated */
.message-bubble::after{display:none}
.message-row.own .message-bubble::after{display:none}

/* timestamp */
.msg-time{
  font-size:10px;color:var(--text-muted);
  padding:3px 2px 0;
  display:flex;align-items:center;gap:4px;
  opacity:.75;
}
.message-row.own .msg-time{justify-content:flex-end}
.message-row.own .msg-time{color:rgba(255,255,255,.65);opacity:1}

/* ── Reactions ───────────────────────────────────────────────── */
.reactions-bar{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.reaction-chip{
  background:var(--bg-raised);
  border:1px solid var(--border-default);
  border-radius:99px;
  padding:3px 8px;
  font-size:13px;
  cursor:pointer;
  transition:all .2s var(--t-spring);
  display:flex;align-items:center;gap:4px;
  color:var(--text-secondary);
  box-shadow:0 1px 4px rgba(0,0,0,.1);
}
.reaction-chip:hover{transform:scale(1.15);box-shadow:0 3px 10px rgba(0,0,0,.15)}
.reaction-chip.own{
  border-color:var(--mood,var(--accent));
  background:var(--mood-glow,var(--accent-glow));
  color:var(--mood,var(--accent));
}
.reaction-chip span{font-size:10.5px;font-weight:800}

/* ── Typing indicator ────────────────────────────────────────── */
.typing-row{
  display:flex;align-items:center;gap:10px;
  padding:4px 14px 8px;
  font-size:12px;color:var(--text-muted);
  flex-shrink:0;min-height:28px;
}
.typing-bubble{
  display:flex;align-items:center;gap:4px;
  background:var(--bg-card);
  border:1px solid var(--border-subtle);
  border-radius:18px 18px 18px 4px;
  padding:8px 12px;
  box-shadow:0 1px 4px rgba(0,0,0,.15);
}
.typing-dots{display:flex;gap:4px;align-items:center}
.td{
  width:7px;height:7px;border-radius:50%;
  background:var(--mood,var(--accent));
  animation:tdBounce 1.3s ease-in-out infinite;
  opacity:.5;
}
.td:nth-child(2){animation-delay:0.18s}
.td:nth-child(3){animation-delay:0.36s}
@keyframes tdBounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

/* ── Date divider ────────────────────────────────────────────── */
.date-divider{
  display:flex;align-items:center;gap:10px;
  margin:16px 0 8px;color:var(--text-muted);font-size:11px;
}
.date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:var(--border-subtle)}
.date-divider span{
  background:var(--bg-raised);border:1px solid var(--border-subtle);
  padding:3px 12px;border-radius:99px;white-space:nowrap;
  font-weight:600;letter-spacing:.3px;
}

/* ═══════════════════════════════════════════════════════════════
   INPUT BAR
   ═══════════════════════════════════════════════════════════════ */
.input-area{
  padding:10px 12px 10px;
  border-top:1px solid var(--border-subtle);
  background:rgba(11,20,16,0.82);
  backdrop-filter:blur(24px) saturate(1.4);
  -webkit-backdrop-filter:blur(24px) saturate(1.4);
  flex-shrink:0;position:relative;z-index:10;
}
.reply-strip{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(34,197,94,.07);
  border-radius:12px;
  padding:8px 12px;margin-bottom:8px;
  border-left:3px solid var(--mood,var(--accent));
  animation:popIn .18s var(--t-spring) both;
}
.reply-strip-text{font-size:12.5px;color:var(--text-muted)}
.reply-strip-text strong{color:var(--mood,var(--accent));font-weight:700}
/* EDIT MODE STRIP */
.edit-strip{display:flex;align-items:center;justify-content:space-between;background:rgba(234,179,8,.07);border-radius:var(--radius-md);padding:7px 10px;margin-bottom:7px;border-left:3px solid #eab308}
.edit-strip-text{font-size:12.5px;color:var(--text-muted)}
.edit-strip-text strong{color:#eab308;font-weight:600}
/* EDITED TAG */
.edited-tag{font-size:9.5px;color:var(--text-muted);font-style:italic;opacity:.7;margin-left:3px}
/* Draft indicator in conv list */
.conv-draft-badge{font-size:11px;color:#eab308;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-draft-preview{color:#eab308;opacity:.85}
/* Own mention highlight */
.mention-tag.own-mention{background:rgba(234,179,8,.18)!important;color:#eab308!important;font-weight:700;padding:0 4px;border-radius:4px;animation:mentionPing .4s ease}
@keyframes mentionPing{0%{background:rgba(234,179,8,.5)}100%{background:rgba(234,179,8,.18)}}
/* Gallery enhancements */
.gallery-date-group{padding:10px 16px 6px;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:2}
.gallery-cell-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.5) 0%,transparent 50%);opacity:0;transition:.2s}
.gallery-cell:hover .gallery-cell-overlay{opacity:1}
.gallery-cell-date{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:9px;color:rgba(255,255,255,.8);font-weight:600}
/* Lightbox nav */
.gallery-lightbox-nav{position:fixed;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;z-index:9200}
.gallery-lightbox-nav:hover{background:rgba(255,255,255,.22)}
.gallery-lightbox-nav.prev{left:12px}
.gallery-lightbox-nav.next{right:12px}
.gallery-lightbox-counter{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);color:#fff;font-size:12px;padding:4px 12px;border-radius:20px;z-index:9200}
/* Links tab */
.gallery-link-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border-subtle);cursor:pointer;transition:.15s;text-decoration:none;color:inherit}
.gallery-link-item:hover{background:var(--bg-raised)}
.gallery-link-thumb{width:52px;height:52px;border-radius:var(--radius-md);object-fit:cover;background:var(--bg-raised);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
.gallery-link-domain{font-size:11px;color:var(--accent);font-weight:600}
.gallery-link-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gallery-link-date{font-size:11px;color:var(--text-muted)}
/* @MENTION HIGHLIGHT */
.mention-tag{color:var(--accent);font-weight:600;background:var(--accent-glow);border-radius:4px;padding:0 3px}
/* @MENTION POPUP */
.mention-popup{position:absolute;bottom:calc(100% + 4px);left:0;right:0;background:var(--bg-card);border:1px solid var(--border-default);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);z-index:200;max-height:220px;overflow-y:auto;padding:4px}
.mention-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-md);cursor:pointer;transition:.12s}
.mention-item:hover,.mention-item.active{background:var(--bg-hover)}
.mention-item .av{width:28px;height:28px;font-size:11px;flex-shrink:0}
.mention-item-name{font-size:13px;font-weight:600}
.mention-item-username{font-size:11px;color:var(--text-muted)}
/* MEDIA GALLERY */
.gallery-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;display:flex;flex-direction:column;animation:fadeIn .18s}
.gallery-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.gallery-tabs{display:flex;gap:4px;background:var(--bg-raised);border-radius:var(--radius-full);padding:3px}
.gallery-tab{padding:5px 16px;border:none;background:none;color:var(--text-muted);border-radius:var(--radius-full);cursor:pointer;font-size:13px;font-weight:500;transition:.15s}
.gallery-tab.active{background:var(--accent);color:#fff}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:3px;padding:12px;overflow-y:auto;flex:1}
.gallery-cell{position:relative;aspect-ratio:1;border-radius:var(--radius-md);overflow:hidden;cursor:pointer;background:var(--bg-raised)}
.gallery-cell img{width:100%;height:100%;object-fit:cover;transition:.2s}
.gallery-cell:hover img{transform:scale(1.05)}
.gallery-cell-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;background:rgba(0,0,0,.3)}
.gallery-file-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--radius-lg);background:var(--bg-raised);cursor:pointer;transition:.15s}
.gallery-file-item:hover{background:var(--bg-hover)}
.gallery-empty{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px}
.gallery-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9100;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.gallery-lightbox img{max-width:92vw;max-height:80vh;object-fit:contain;border-radius:var(--radius-lg)}
.feat-btns{
  display:flex;gap:5px;flex-wrap:nowrap;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;margin-bottom:8px;
  padding-bottom:1px;
}
.feat-btns::-webkit-scrollbar{display:none}
.feat-btn{
  padding:5px 11px;
  border-radius:99px;
  border:1px solid var(--border-default);
  background:rgba(255,255,255,.04);
  color:var(--text-muted);
  font-family:var(--font-body);font-size:11.5px;font-weight:500;
  cursor:pointer;
  display:inline-flex;align-items:center;gap:5px;
  transition:background .18s,border-color .18s,color .18s,transform .15s var(--t-spring),box-shadow .18s;
  white-space:nowrap;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.feat-btn:hover{
  background:var(--accent-glow);
  border-color:var(--border-accent);
  color:var(--accent);
  transform:translateY(-1px);
  box-shadow:0 3px 10px rgba(34,197,94,.15);
}
.feat-btn.on{
  background:rgba(34,197,94,.18);
  border-color:var(--accent);
  color:var(--accent);
  box-shadow:0 0 0 1px rgba(34,197,94,.3);
}
.feat-btn:active{transform:scale(0.94)}

/* input row wrapper */
.input-row{display:flex;align-items:flex-end;gap:8px}
.input-wrap{
  flex:1;
  background:rgba(255,255,255,.055);
  border:1.5px solid rgba(255,255,255,.1);
  border-radius:20px;
  display:flex;align-items:flex-end;
  padding:9px 12px;gap:8px;
  transition:border-color .2s,box-shadow .2s,background .2s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
}
.input-wrap:focus-within{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(34,197,94,.15),inset 0 1px 0 rgba(255,255,255,.06);
  background:rgba(255,255,255,.07);
}
.msg-input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text-primary);font-family:var(--font-body);
  font-size:16px; /* 16px prevents iOS zoom */
  line-height:1.5;resize:none;max-height:120px;
  padding:1px 0;
  caret-color:var(--accent);
}
.msg-input::placeholder{color:var(--text-placeholder);font-weight:400}
.msg-input::-webkit-scrollbar{width:0}
.send-btn{
  width:42px;height:42px;border-radius:13px;border:none;
  background:linear-gradient(145deg,var(--accent-bright),var(--accent-dim));
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .25s var(--t-spring),box-shadow .2s ease,border-radius .2s;
  flex-shrink:0;
  box-shadow:0 4px 16px rgba(34,197,94,.45),inset 0 1px 0 rgba(255,255,255,.2);
  -webkit-tap-highlight-color:transparent;
}
.send-btn:hover{transform:scale(1.07) translateY(-1px);box-shadow:0 6px 20px rgba(34,197,94,.55),inset 0 1px 0 rgba(255,255,255,.2);border-radius:15px}
.send-btn:active{transform:scale(0.9)}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

/* EMPTY STATE */
.empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;text-align:center;padding:48px 32px;user-select:none;
}
.empty-state .es-art{
  width:96px;height:96px;
  background:radial-gradient(circle at 40% 35%, rgba(34,197,94,.18) 0%, rgba(34,197,94,.04) 60%, transparent 100%);
  border:1px solid rgba(34,197,94,.15);
  border-radius:28px;
  display:flex;align-items:center;justify-content:center;
  animation:esFloat 4s ease-in-out infinite;
  box-shadow:0 8px 32px rgba(34,197,94,.1),inset 0 1px 0 rgba(255,255,255,.06);
  color:var(--accent);opacity:0.8;
}
.empty-state h3{
  font-family:var(--font-display);font-size:21px;font-weight:800;
  color:var(--text-secondary);letter-spacing:-.3px;
}
.empty-state p{font-size:13px;max-width:220px;line-height:1.65;color:var(--text-muted)}
.empty-state .es-hint{
  display:flex;align-items:center;gap:6px;
  font-size:11.5px;color:var(--text-muted);
  background:rgba(255,255,255,.04);
  border:1px solid var(--border-subtle);
  border-radius:99px;
  padding:5px 14px;
  margin-top:4px;
}
@keyframes esFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:400;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg-card);border:1px solid var(--border-default);border-radius:var(--radius-xl);padding:22px;width:100%;max-width:440px;box-shadow:var(--shadow-lg);animation:popIn 0.18s ease both}
.modal h3{font-family:var(--font-display);font-size:17px;font-weight:800;color:var(--text-primary);margin-bottom:18px}
@keyframes popIn{from{transform:scale(0.93);opacity:0}to{transform:scale(1);opacity:1}}
.form-field{margin-bottom:14px}
.form-label{display:block;font-size:11.5px;font-weight:600;color:var(--text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;background:var(--bg-input);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:9px 13px;color:var(--text-primary);font-family:var(--font-body);font-size:13.5px;outline:none;transition:border-color .18s,box-shadow .18s}
.form-input::placeholder{color:var(--text-placeholder)}
.form-input:focus{border-color:var(--border-accent);box-shadow:0 0 0 3px var(--accent-glow)}
.btn{padding:9px 18px;border-radius:var(--radius-md);border:none;font-family:var(--font-body);font-size:13.5px;font-weight:600;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-dim));color:#fff;box-shadow:var(--shadow-glow)}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border-default)}
.btn-ghost:hover{background:var(--bg-hover);color:var(--text-secondary)}
.btn-danger{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.divider{height:1px;background:var(--border-subtle);margin:12px 0}

/* STORY VIEWER */
.story-viewer{position:fixed;inset:0;background:#000;z-index:500;display:flex;align-items:center;justify-content:center}
.story-content{width:100%;max-width:440px;height:100%;position:relative;display:flex;align-items:center;justify-content:center}
.story-slide{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font-display);font-size:22px;font-weight:700;color:#fff;text-align:center;padding:20px}
.story-progress-bar{position:absolute;top:16px;left:16px;right:16px;display:flex;gap:4px}
.story-progress-seg{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:99px;overflow:hidden}
.story-progress-fill{height:100%;background:#fff;border-radius:99px;animation:storyProgress 5s linear forwards}
.story-progress-fill.done{width:100%;animation:none}
@keyframes storyProgress{from{width:0}to{width:100%}}
.story-header{position:absolute;top:32px;left:16px;right:16px;display:flex;align-items:center;justify-content:space-between}
.story-header-left{display:flex;align-items:center;gap:8px}
.story-user-name{color:#fff;font-size:14px;font-weight:600}
.story-time{color:rgba(255,255,255,.7);font-size:12px}

/* TOAST */
.toast-container{position:fixed;top:20px;right:20px;z-index:9000;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:10px 16px;font-size:13.5px;box-shadow:var(--shadow-md);animation:toastIn .25s ease;display:flex;align-items:center;gap:8px;max-width:300px}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

/* SETTINGS PANEL */
.settings-section{margin-bottom:20px}
.settings-section h4{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.theme-toggle{display:flex;background:var(--bg-raised);border:1px solid var(--border-default);border-radius:99px;padding:3px}
.theme-opt{flex:1;padding:5px 12px;border-radius:99px;border:none;background:transparent;color:var(--text-muted);font-family:var(--font-body);font-size:12.5px;cursor:pointer;transition:all .18s;text-align:center}
.theme-opt.active{background:var(--accent);color:#fff}
.accent-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.accent-swatch{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .18s,border-color .18s}
.accent-swatch:hover{transform:scale(1.15)}
.accent-swatch.selected{border-color:white;transform:scale(1.18);box-shadow:0 0 10px rgba(255,255,255,.3)}

/* POLL */
.poll-card{background:var(--bg-raised);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:12px;min-width:200px}
.poll-question{font-size:13.5px;font-weight:700;color:var(--text-primary);margin-bottom:10px}
.poll-opt{position:relative;background:var(--bg-input);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:8px 11px;margin-bottom:5px;cursor:pointer;overflow:hidden;transition:border-color .18s}
.poll-opt.voted{border-color:var(--mood,var(--accent))}
.poll-bar{position:absolute;left:0;top:0;height:100%;background:var(--mood-glow,var(--accent-glow));border-radius:var(--radius-md);transition:width .5s ease;pointer-events:none}
.poll-opt-inner{position:relative;display:flex;justify-content:space-between;font-size:13px;color:var(--text-primary)}
.poll-pct{color:var(--mood,var(--accent));font-weight:700;font-size:11.5px}

/* NOTIFICATION PANEL */
.notif-item{display:flex;gap:10px;padding:10px;border-radius:var(--radius-md);cursor:pointer;transition:background .18s}
.notif-item:hover{background:var(--bg-hover)}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px}
.notif-body{font-size:13px;color:var(--text-secondary);line-height:1.4}
.notif-time{font-size:10.5px;color:var(--text-muted);margin-top:3px}

/* BOTTOM NAV — always hidden on desktop, shown on mobile */
/* ═══════════════════════════════════════════════════════════════
   SVG ICON BASE — applied to all inline SVGs via icon()
   ═══════════════════════════════════════════════════════════════ */
.si{display:block;flex-shrink:0;pointer-events:none}

/* ═══════════════════════════════════════════════════════════════
   BOTTOM NAVIGATION — pill indicator design
   ═══════════════════════════════════════════════════════════════ */
.bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:calc(62px + env(safe-area-inset-bottom,0px));
  padding-bottom:env(safe-area-inset-bottom,0px);
  background:var(--glass-bg);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border-top:1px solid var(--glass-border);
  z-index:120;
  align-items:center;
  justify-content:space-around;
  padding:0 6px;
  transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s ease;
  position:fixed;
}
.bottom-nav.hidden{transform:translateY(100%) !important;opacity:0 !important;pointer-events:none !important}

/* sliding pill */
.nav-pill{
  position:absolute;
  top:8px;
  height:32px;
  background:rgba(34,197,94,.14);
  border-radius:10px;
  border:1px solid rgba(34,197,94,.22);
  pointer-events:none;
  transition:transform .32s cubic-bezier(.34,1.3,.64,1), width .32s cubic-bezier(.34,1.3,.64,1);
  z-index:0;
}

.nav-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;padding:7px 4px 5px;
  border-radius:12px;border:none;
  background:transparent;color:var(--text-muted);
  transition:color .22s ease,transform .16s var(--t-spring);
  position:relative;z-index:1;
  -webkit-tap-highlight-color:transparent;
  min-width:0;
}
.nav-tab:active{transform:scale(0.86)}
.nav-tab.active{color:var(--accent)}
.nav-tab.active .nav-icon{transform:scale(1.12)}
.nav-icon{
  display:flex;align-items:center;justify-content:center;
  width:22px;height:22px;
  transition:transform .22s var(--t-spring);
}
.nav-tab-label{
  font-size:9px;font-weight:700;letter-spacing:.3px;
  text-transform:uppercase;line-height:1;
  transition:color .22s ease;
}
.nav-tab.active .nav-tab-label{color:var(--accent)}
.nav-badge{
  position:absolute;top:5px;right:calc(50% - 18px);
  background:#ef4444;color:#fff;
  font-size:9px;font-weight:800;
  padding:1px 4px;border-radius:99px;
  min-width:16px;text-align:center;line-height:1.4;
  border:1.5px solid var(--bg-deep);
  animation:badgePop .3s var(--t-spring) both;
}

/* ═══════════════════════════════════════════════════════════════
   FLOATING ACTION BUTTON — redesigned
   ═══════════════════════════════════════════════════════════════ */
.fab{
  display:none;
  position:fixed;
  bottom:calc(76px + env(safe-area-inset-bottom,0px));
  right:16px;
  width:54px;height:54px;
  border-radius:16px;
  background:linear-gradient(145deg,var(--accent-bright),var(--accent-dim));
  border:none;
  color:#fff;
  cursor:pointer;
  box-shadow:
    0 6px 24px rgba(34,197,94,0.5),
    0 2px 8px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,255,255,.25);
  z-index:115;
  align-items:center;justify-content:center;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,opacity .25s,border-radius .2s;
  -webkit-tap-highlight-color:transparent;
}
.fab:hover{
  transform:scale(1.06) translateY(-2px);
  box-shadow:0 10px 32px rgba(34,197,94,0.55),0 3px 10px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.25);
  border-radius:18px;
}
.fab:active{transform:scale(0.9) !important;box-shadow:0 3px 12px rgba(34,197,94,0.4) !important}
.fab.hidden{opacity:0 !important;transform:translateY(20px) scale(0.75) !important;pointer-events:none !important}
.fab-icon{display:flex;align-items:center;justify-content:center;line-height:1}

/* MORE DRAWER BACKDROP */
.drawer-backdrop{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  z-index:130;
  opacity:0;
  transition:opacity .3s ease;
}
.drawer-backdrop.open{opacity:1}

/* MORE DRAWER */
.more-drawer{
  position:fixed;
  bottom:0;left:0;right:0;
  background:var(--bg-card);
  border-radius:24px 24px 0 0;
  border-top:1px solid var(--border-default);
  z-index:140;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  box-shadow:0 -8px 40px rgba(0,0,0,.5);
  max-height:88vh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.more-drawer.open{transform:translateY(0)}
.drawer-handle{
  width:36px;height:4px;
  background:var(--border-strong);
  border-radius:99px;
  margin:12px auto 8px;
}
.drawer-profile{
  display:flex;align-items:center;gap:14px;
  padding:12px 20px 16px;
}
.drawer-avatar{position:relative;flex-shrink:0}
.drawer-profile-info{flex:1;min-width:0}
.drawer-name{font-family:var(--font-display);font-size:17px;font-weight:800;color:var(--text-primary);line-height:1.2}
.drawer-username{font-size:12px;color:var(--text-muted);margin-top:2px}
.drawer-status-pill{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:600;color:var(--accent);
  background:var(--accent-glow);
  border:1px solid var(--border-accent);
  padding:2px 8px;border-radius:99px;
  margin-top:5px;
}
.drawer-menu{display:flex;flex-direction:column;gap:2px;padding:0 10px}
.drawer-item{
  display:flex;align-items:center;gap:14px;
  padding:13px 12px;
  border-radius:var(--radius-lg);
  border:none;
  background:transparent;
  cursor:pointer;
  text-align:left;
  width:100%;
  transition:background .15s;
  -webkit-tap-highlight-color:transparent;
}
.drawer-item:active,.drawer-item:hover{background:var(--bg-hover)}
.drawer-item-icon{font-size:22px;width:28px;text-align:center;flex-shrink:0}
.drawer-item-text{flex:1;min-width:0}
.drawer-item-title{font-size:14px;font-weight:600;color:var(--text-primary);line-height:1.2}
.drawer-item-sub{font-size:11.5px;color:var(--text-muted);margin-top:1px}
.drawer-item-arrow{font-size:20px;color:var(--text-muted);flex-shrink:0}
.drawer-signout{padding:13px 12px;margin:0 10px;border-radius:var(--radius-lg)}

/* SEARCH MODAL */
