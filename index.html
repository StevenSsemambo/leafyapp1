// ══════════════════════════════════════════════════════════════════
// IN-CHAT SEARCH
// ══════════════════════════════════════════════════════════════════
let chatSearchResults=[],chatSearchIdx=-1
function toggleChatSearch(id){const bar=document.getElementById('chat-search-bar-'+id);if(!bar)return;if(bar.style.display==='none'){bar.style.display='flex';setTimeout(()=>document.getElementById('chat-search-input-'+id)?.focus(),50)}else{closeChatSearch(id)}}
function closeChatSearch(id){const bar=document.getElementById('chat-search-bar-'+id);if(bar)bar.style.display='none';document.querySelectorAll('.msg-highlight').forEach(el=>{const p=el.parentNode;p.replaceChild(document.createTextNode(el.textContent),el);p.normalize()});chatSearchResults=[];chatSearchIdx=-1}
function runChatSearch(id,q){
  document.querySelectorAll('.msg-highlight').forEach(el=>{const p=el.parentNode;if(p){p.replaceChild(document.createTextNode(el.textContent),el);p.normalize()}})
  chatSearchResults=[];chatSearchIdx=-1
  const countEl=document.getElementById('chat-search-count-'+id)
  if(!q.trim()){if(countEl)countEl.textContent='';return}
  const conv=CONVERSATIONS.find(c=>c.id===id); if(!conv) return
  conv.messages.forEach(msg=>{if(msg.text&&msg.text.toLowerCase().includes(q.toLowerCase()))chatSearchResults.push(msg.id)})
  if(countEl)countEl.textContent=chatSearchResults.length?`1/${chatSearchResults.length}`:'0 results'
  if(chatSearchResults.length>0){chatSearchIdx=0;highlightChatSearch(q);scrollToSearchResult(chatSearchIdx)}
}
function highlightChatSearch(q){chatSearchResults.forEach((msgId,i)=>{const row=document.getElementById('msg-'+msgId);if(!row)return;const bubble=row.querySelector('.message-bubble');if(!bubble)return;const walker=document.createTreeWalker(bubble,NodeFilter.SHOW_TEXT);const nodes=[];let node;while((node=walker.nextNode()))nodes.push(node);nodes.forEach(tn=>{const idx=tn.textContent.toLowerCase().indexOf(q.toLowerCase());if(idx<0)return;const span=document.createElement('mark');span.className=`msg-highlight${i===chatSearchIdx?' current':''}`;span.textContent=tn.textContent.slice(idx,idx+q.length);const after=tn.splitText(idx);after.textContent=after.textContent.slice(q.length);tn.parentNode.insertBefore(span,after)})})}
function scrollToSearchResult(idx){const msgId=chatSearchResults[idx];if(!msgId)return;document.querySelectorAll('.msg-highlight').forEach(el=>el.classList.remove('current'));const row=document.getElementById('msg-'+msgId);if(row){row.scrollIntoView({behavior:'smooth',block:'center'});const mark=row.querySelector('.msg-highlight');if(mark)mark.classList.add('current')}}
function nextChatResult(id){if(!chatSearchResults.length)return;chatSearchIdx=(chatSearchIdx+1)%chatSearchResults.length;const c=document.getElementById('chat-search-count-'+id);if(c)c.textContent=`${chatSearchIdx+1}/${chatSearchResults.length}`;scrollToSearchResult(chatSearchIdx)}

function initSwipeToReply(convId){
  const container=document.getElementById('messages-container-'+convId); if(!container) return
  let startX=0,startY=0,target=null,dx=0
  container.addEventListener('touchstart',e=>{if(e.touches.length!==1)return;startX=e.touches[0].clientX;startY=e.touches[0].clientY;target=e.target.closest('.message-row');dx=0},{passive:true})
  container.addEventListener('touchmove',e=>{if(!target)return;const cx=e.touches[0].clientX,cy=e.touches[0].clientY;if(Math.abs(cy-startY)>Math.abs(cx-startX)){target=null;return}dx=cx-startX;const isOwn=target.classList.contains('own');const t=55;if(!isOwn&&dx>0&&dx<t){target.querySelector('.message-bubble').style.transform=`translateX(${dx*.5}px)`;const icon=target.querySelector('.swipe-reply-icon');if(icon){icon.style.opacity=Math.min(dx/t,1);icon.style.transform=`translateY(-50%) scale(${.7+.3*dx/t})`}}else if(isOwn&&dx<0&&dx>-t){target.querySelector('.message-bubble').style.transform=`translateX(${dx*.5}px)`;const icon=target.querySelector('.swipe-reply-icon');if(icon){icon.style.opacity=Math.min(-dx/t,1);icon.style.transform=`translateY(-50%) scale(${.7+.3*(-dx)/t})`}}},{passive:true})
  container.addEventListener('touchend',e=>{if(!target)return;const bubble=target.querySelector('.message-bubble');if(bubble){bubble.style.transform='';bubble.style.transition='transform 0.3s var(--t-spring)';setTimeout(()=>{if(bubble)bubble.style.transition=''},300)}const icon=target.querySelector('.swipe-reply-icon');if(icon){icon.style.opacity='0';icon.style.transform='translateY(-50%)'}const isOwn=target.classList.contains('own'),t=55;if((!isOwn&&dx>t)||(isOwn&&dx<-t)){const msgId=target.dataset.msgId;const msg=CONVERSATIONS.find(c=>c.id===convId)?.messages.find(m=>m.id===msgId);if(msg){const sN=msg.sender==='me'?'You':(USERS[msg.sender]?.name||'Unknown');setReplyTo(convId,msgId,sN,msg.text||'');if(navigator.vibrate)navigator.vibrate(30)}}target=null;dx=0},{passive:true})
}

// ══════════════════════════════════════════════════════════════════
// SWIPE BETWEEN CONVERSATIONS (mobile)
// Horizontal swipe on the chat HEADER navigates to prev/next conv
// ══════════════════════════════════════════════════════════════════
let _convSwipeStartX = 0, _convSwipeStartY = 0, _convSwiping = false

function initConvSwipe() {
  const chatArea = document.getElementById('chat-area')
  if (!chatArea) return

  chatArea.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return
    // Only trigger on the chat header area
    if (!e.target.closest('.chat-header')) return
    _convSwipeStartX = e.touches[0].clientX
    _convSwipeStartY = e.touches[0].clientY
    _convSwiping = true
  }, { passive: true })

  chatArea.addEventListener('touchmove', e => {
    if (!_convSwiping || e.touches.length !== 1) return
    const dx = e.touches[0].clientX - _convSwipeStartX
    const dy = e.touches[0].clientY - _convSwipeStartY
    if (Math.abs(dy) > Math.abs(dx)) { _convSwiping = false; return }
    // Show directional hint
    const hintLeft  = document.getElementById('swipe-nav-left')
    const hintRight = document.getElementById('swipe-nav-right')
    if (dx > 30 && hintLeft)  hintLeft.style.opacity  = Math.min((dx - 30) / 60, 1)
    if (dx < -30 && hintRight) hintRight.style.opacity = Math.min((-dx - 30) / 60, 1)
  }, { passive: true })

  chatArea.addEventListener('touchend', e => {
    if (!_convSwiping) return
    _convSwiping = false
    document.getElementById('swipe-nav-left')?.style && (document.getElementById('swipe-nav-left').style.opacity = '0')
    document.getElementById('swipe-nav-right')?.style && (document.getElementById('swipe-nav-right').style.opacity = '0')
    const dx = (e.changedTouches[0]?.clientX || 0) - _convSwipeStartX
    const dy = (e.changedTouches[0]?.clientY || 0) - _convSwipeStartY
    if (Math.abs(dx) < 60 || Math.abs(dy) > 50) return

    // Get current visible conversations (same filter as list)
    const tab = state.tab
    const visibleConvs = CONVERSATIONS.filter(c => {
      if (convMeta[c.id]?.archived) return false
      if (tab === 'dms')    return c.type === 'dm'
      if (tab === 'groups') return c.type === 'group'
      return true
    })
    const pinned   = visibleConvs.filter(c => convMeta[c.id]?.pinnedConv)
    const unpinned = visibleConvs.filter(c => !convMeta[c.id]?.pinnedConv)
    const ordered  = [...pinned, ...unpinned]
    const idx = ordered.findIndex(c => c.id === state.activeConvId)
    if (idx === -1) return

    let nextIdx
    if (dx > 60) {
      // Swipe right → previous conversation
      nextIdx = idx - 1
      if (nextIdx < 0) { toast('First conversation', 'info'); return }
    } else {
      // Swipe left → next conversation
      nextIdx = idx + 1
      if (nextIdx >= ordered.length) { toast('Last conversation', 'info'); return }
    }
    if (navigator.vibrate) navigator.vibrate(20)
    openConversation(ordered[nextIdx].id)
  }, { passive: true })
}

// Inject swipe nav hints into DOM once
function ensureSwipeNavHints() {
  if (document.getElementById('swipe-nav-left')) return
  const left  = document.createElement('div')
  left.id = 'swipe-nav-left';  left.className = 'swipe-nav-hint left';  left.textContent = '‹'
  const right = document.createElement('div')
  right.id = 'swipe-nav-right'; right.className = 'swipe-nav-hint right'; right.textContent = '‹'
  document.body.appendChild(left)
  document.body.appendChild(right)
}

function showDestructModal(id){
  closeAllModals()
  const overlay=document.createElement('div'); overlay.className='modal-overlay'; overlay.onclick=e=>{if(e.target===overlay)closeAllModals()}
  overlay.innerHTML=`<div class="modal pop-in" onclick="event.stopPropagation()">
    <h3>🔥 Self-Destructing Message</h3>
    <p style="color:var(--text-muted);font-size:13.5px;margin-bottom:18px">Message disappears after the timer expires.</p>
    <div class="form-field">
      <label class="form-label">Disappears after</label>
      <select class="form-input" id="destruct-time">
        <option value="30">30 seconds</option><option value="60">1 minute</option>
        <option value="300">5 minutes</option><option value="3600">1 hour</option>
        <option value="86400">24 hours</option>
      </select>
    </div>
    <div class="form-field"><label class="form-label">Message</label>
      <textarea class="form-input" id="destruct-msg" rows="3" placeholder="This message will self-destruct..."></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeAllModals()">Cancel</button>
      <button class="btn btn-primary" onclick="sendDestructMsg('${id}')">🔥 Send</button>
    </div>
  </div>`

async function sendDestructMsg(convId){
  const text=document.getElementById('destruct-msg')?.value.trim()
  const secs=parseInt(document.getElementById('destruct-time')?.value||'60')
  if(!text){toast('Enter a message','error');return}
  const expiresAt=new Date(Date.now()+secs*1000).toISOString()
  const {data,error}=await window._db.from('messages').insert({
    conversation_id:convId, sender_id:myProfile.id, text, type:'text',
    is_destruct:true, expires_at:expiresAt
  }).select().single()
  if(error){toast('Failed to send','error');return}
  const conv=CONVERSATIONS.find(c=>c.id===convId)
  if(conv&&data){
    conv.messages.push({...mapMessage({...data,message_reactions:[],message_reads:[]}),isDestruct:true})
    renderMessages(convId)
  }
  closeAllModals()
  toast('🔥 Self-destruct message sent!','success')
}

function showNotifsModal(){
  closeAllModals()

  // Show unread conversations first (always real data)
  const unreadConvs = CONVERSATIONS.filter(c => c.unread > 0 && !convMeta[c.id]?.muted)
    .sort((a,b) => b.unread - a.unread)

  const unreadSection = unreadConvs.length > 0 ? `
    <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Unread Conversations</div>
    ${unreadConvs.map(c => {

      const avatarBg = c.type==='group' ? 'background:linear-gradient(135deg,var(--accent-dim),var(--accent));color:#fff' : ''
      const initials = u ? u.initials : (c.name[0]||'G')
      return `<div style="display:flex;align-items:center;gap:12px;padding:10px;border-radius:var(--radius-md);margin-bottom:4px;background:var(--accent-glow);border:1px solid var(--border-accent);cursor:pointer" onclick="openConversation('${c.id}');closeAllModals()">

        </div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:13.5px">${c.name}</div>
          <div style="font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.preview||''}</div>

  overlay.innerHTML=`<div class="modal pop-in" onclick="event.stopPropagation()">

      <h3 style="margin:0">🔔 Notifications</h3>

        <button onclick="closeAllModals()" class="icon-btn">✕</button>
      </div>
    </div>
    <div style="max-height:70vh;overflow-y:auto">
      ${unreadSection}
      ${recentNotifs.length===0&&unreadConvs.length===0
        ?`<div style="text-align:center;color:var(--text-muted);padding:30px 0;font-size:13px">🎉 You're all caught up!</div>`
        :recentNotifs.length>0?`
          <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Recent Activity</div>
          ${recentNotifs.map(n=>`
            <div style="display:flex;gap:12px;padding:10px;border-radius:var(--radius-md);margin-bottom:4px;background:${n.read?'transparent':'var(--bg-raised)'};border:1px solid ${n.read?'transparent':'var(--border-default)'};cursor:pointer" ${n.conversation_id?`onclick="openConversation('${n.conversation_id}');closeAllModals()"`:''}>
              <span style="font-size:20px;flex-shrink:0">${icons[n.type]||'🔔'}</span>

              ${!n.read?`<div style="width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px"></div>`:''}
            </div>`).join('')}` : ''}

  </div>`

  setTimeout(() => markNotifsRead(), 500)

  overlay.className = 'modal-overlay'
  overlay.onclick = e => { if (e.target === overlay) closeAllModals() }

    const u = uid === myProfile.id ? { ...ME, bio: myProfile.bio, avatar_url: myProfile.avatar_url } : USERS[uid]

          ${u.name}${isSelf ? ' <span style="font-size:10px;color:var(--text-muted)">(You)</span>' : ''}

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <h3 style="margin:0">👥 Members (${conv.members.length})</h3>

    ${amAdmin ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">Tap a member to view profile · Hover to see admin actions</div>` : `<div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">Tap a member to view their profile</div>`}
    <div style="max-height:52vh;overflow-y:auto">${membersHtml}</div>
    <div style="border-top:1px solid var(--border-subtle);margin-top:12px;padding-top:12px;display:flex;flex-direction:column;gap:8px">

        <button class="btn btn-ghost" style="width:100%;text-align:left;padding:10px 14px" onclick="closeAllModals();showAddMemberModal('${convId}')">➕ Add Member</button>

// ── Rename group ─────────────────────────────────────────────────
function showRenameGroupModal(convId) {
  closeAllModals()
  const conv = CONVERSATIONS.find(c => c.id === convId)
  if (!conv) return
  const overlay = document.createElement('div')
  overlay.className = 'modal-overlay'
  overlay.onclick = e => { if (e.target === overlay) closeAllModals() }
  overlay.innerHTML = `<div class="modal pop-in" style="max-width:320px" onclick="event.stopPropagation()">
    <h3 style="margin-bottom:16px">✏️ Rename Group</h3>
    <div class="form-field">
      <label class="form-label">Group Name</label>
      <input class="form-input" id="rename-group-input" value="${conv.name.replace(/"/g,'&quot;')}" placeholder="Group name"/>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeAllModals()">Cancel</button>
      <button class="btn btn-primary" onclick="doRenameGroup('${convId}')">Save</button>
    </div>
  </div>`
  document.body.appendChild(overlay)
  setTimeout(() => document.getElementById('rename-group-input')?.focus(), 50)
}

async function doRenameGroup(convId) {
  const newName = document.getElementById('rename-group-input')?.value.trim()
  if (!newName) { toast('Name cannot be empty', 'error'); return }
  const { error } = await window._db.from('conversations').update({ name: newName }).eq('id', convId)
  if (error) { toast('Could not rename: ' + error.message, 'error'); return }
  const conv = CONVERSATIONS.find(c => c.id === convId)
  if (conv) {
    conv.name = newName
    renderConversations()
    // Update chat header if this conv is open
    if (state.activeConvId === convId) {
      const h2 = document.querySelector('.chat-header h2')
      if (h2) h2.textContent = newName
    }
  }
  closeAllModals()
  toast(`✅ Group renamed to "${newName}"`, 'success')
}

// ── Promote to admin ─────────────────────────────────────────────
async function promoteToAdmin(convId, userId) {
  const u = USERS[userId]
  if (!confirm(`Make ${u?.name || 'this person'} a group admin?`)) return
  const { error } = await window._db.from('conversation_members')
    .update({ role: 'admin' })
    .eq('conversation_id', convId)
    .eq('user_id', userId)
  if (error) { toast('Could not promote: ' + error.message, 'error'); return }
  toast(`⭐ ${u?.name || 'User'} is now an admin`, 'success')
  closeAllModals()
  showMembersPanel(convId)
}

// ── Remove member ────────────────────────────────────────────────
async function removeMember(convId, userId, userName) {
  const overlay = document.createElement('div')
  overlay.className = 'modal-overlay'
  overlay.onclick = e => { if (e.target === overlay) closeAllModals() }
  overlay.innerHTML = `<div class="modal pop-in" style="max-width:300px;text-align:center" onclick="event.stopPropagation()">
    <div style="font-size:36px;margin-bottom:12px">⚠️</div>
    <h3 style="margin-bottom:8px">Remove ${userName}?</h3>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px">They will be removed from this group and can only rejoin if re-added.</p>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeAllModals();showMembersPanel('${convId}')">Cancel</button>
      <button class="btn btn-primary" style="background:#ef4444;border-color:#ef4444" onclick="doRemoveMember('${convId}','${userId}')">Remove</button>
    </div>
  </div>`
  document.body.appendChild(overlay)
}

async function doRemoveMember(convId, userId) {
  const { error } = await window._db.from('conversation_members')
    .update({ left_at: new Date().toISOString() })
    .eq('conversation_id', convId)
    .eq('user_id', userId)
  if (error) { toast('Could not remove: ' + error.message, 'error'); return }
  const conv = CONVERSATIONS.find(c => c.id === convId)
  if (conv) {
    conv.members = conv.members.filter(id => id !== userId)
    if (state.activeConvId === convId) openConversation(convId)
    renderConversations()
  }
  closeAllModals()
  toast(`✅ ${USERS[userId]?.name || 'User'} removed from group`, 'success')
}

// ── Leave group ──────────────────────────────────────────────────
function confirmLeaveGroup(convId) {
  const conv = CONVERSATIONS.find(c => c.id === convId)
  const overlay = document.createElement('div')
  overlay.className = 'modal-overlay'
  overlay.onclick = e => { if (e.target === overlay) closeAllModals() }
  overlay.innerHTML = `<div class="modal pop-in" style="max-width:300px;text-align:center" onclick="event.stopPropagation()">
    <div style="font-size:36px;margin-bottom:12px">🚪</div>
    <h3 style="margin-bottom:8px">Leave "${conv?.name}"?</h3>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px">You'll stop receiving messages from this group.</p>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeAllModals()">Cancel</button>
      <button class="btn btn-primary" style="background:#ef4444;border-color:#ef4444" onclick="doLeaveGroup('${convId}')">Leave</button>
    </div>
  </div>`
  document.body.appendChild(overlay)
}

async function doLeaveGroup(convId) {
  const { error } = await window._db.from('conversation_members')
    .update({ left_at: new Date().toISOString() })
    .eq('conversation_id', convId)
    .eq('user_id', myProfile.id)
  if (error) { toast('Could not leave: ' + error.message, 'error'); return }
  const idx = CONVERSATIONS.findIndex(c => c.id === convId)
  if (idx >= 0) CONVERSATIONS.splice(idx, 1)
  if (state.activeConvId === convId) {
    state.activeConvId = null
    const ca = document.getElementById('chat-area')
    if (ca) ca.innerHTML = `<div class="chat-bg-pattern"></div><div class="empty-state"><div class="es-art"><svg width="48" height="48" viewBox="0 0 64 64" fill="none"><path d="M32 6 C32 6 10 18 10 36 C10 48 20 58 32 58 C32 58 32 38 48 22 C40 34 32 58 32 58 C44 58 54 48 54 36 C54 20 32 6 32 6Z" fill="currentColor" opacity="0.95"/><path d="M32 58 C32 58 28 40 18 30" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round" fill="none"/></svg></div><h3>Welcome to Leafy</h3><p>Select a conversation to start chatting</p></div>`
    if (state.isMobile) closeSidebar()
  }
  renderConversations()
  closeAllModals()
  toast('You left the group', 'info')
}

function runGlobalSearch(q){
  const results=document.getElementById('global-search-results'); if(!results) return
  if(!q.trim()){results.innerHTML='';return}
  const ql=q.toLowerCase()
  const convMatches=CONVERSATIONS.filter(c=>c.name.toLowerCase().includes(ql)||c.preview?.toLowerCase().includes(ql))
  const userMatches=Object.values(USERS).filter(u=>u.name.toLowerCase().includes(ql)||u.username.toLowerCase().includes(ql))
  // Search message content across all loaded conversations
  const msgMatches=[]
  CONVERSATIONS.forEach(c=>{
    c.messages.forEach(m=>{
      if(!m.isFile&&m.text&&m.text.toLowerCase().includes(ql)){
        msgMatches.push({conv:c,msg:m})
      }
    })
  })
  results.innerHTML=[
    convMatches.length?`<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Conversations</div>`:'',
    ...convMatches.map(c=>`<div style="padding:10px;border-radius:var(--radius-md);cursor:pointer;transition:.15s" onclick="openConversation('${c.id}');closeAllModals()" onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background='transparent'"><div style="font-weight:600">${c.name}</div><div style="font-size:12px;color:var(--text-muted)">${c.preview||''}</div></div>`),
    userMatches.length?`<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin:8px 0">People</div>`:'',
    ...userMatches.map(u=>`<div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--radius-md);cursor:pointer;transition:.15s" onclick="startDM('${u.id}');closeAllModals()" onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background='transparent'"><div class="av" style="width:32px;height:32px;font-size:12px;overflow:hidden">${u.avatar_url?`<img src="${u.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`:u.initials}</div><div><div style="font-weight:600;font-size:13px">${u.name}</div><div style="font-size:11px;color:var(--text-muted)">@${u.username}</div></div></div>`),
    msgMatches.length?`<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin:8px 0">Messages</div>`:'',
    ...msgMatches.slice(0,12).map(({conv,msg})=>{
      const hi=msg.text.replace(new RegExp(ql.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark style="background:rgba(234,179,8,.4);border-radius:2px">${m}</mark>`)
      return `<div style="padding:10px;border-radius:var(--radius-md);cursor:pointer;transition:.15s" onclick="openConversation('${conv.id}');closeAllModals()" onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background='transparent'">
        <div style="font-size:11px;color:var(--accent);font-weight:600;margin-bottom:2px">${conv.name} · ${msg.time}</div>
        <div style="font-size:13px;color:var(--text-secondary)">${hi.slice(0,120)}</div>
      </div>`
    }),
    !convMatches.length&&!userMatches.length&&!msgMatches.length?`<div style="text-align:center;color:var(--text-muted);padding:24px;font-size:13px">No results for "${q}"</div>`:'',
  ].join('')
}

// ══════════════════════════════════════════════════════════════════
// NOTIFICATION SOUND
// ══════════════════════════════════════════════════════════════════
function playNotifSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)()
    const now = ctx.currentTime
    // Three-note ascending arpeggio: E5 → G#5 → B5 (E major chord)
    // With a soft sine + triangle blend for warmth
    const notes = [659.25, 830.61, 987.77]
    notes.forEach((freq, i) => {
      const osc1 = ctx.createOscillator(), osc2 = ctx.createOscillator()
      const gain = ctx.createGain()
      osc1.connect(gain); osc2.connect(gain); gain.connect(ctx.destination)
      osc1.type = 'sine';     osc1.frequency.value = freq
      osc2.type = 'triangle'; osc2.frequency.value = freq
      const t = now + i * 0.10
      gain.gain.setValueAtTime(0, t)
      gain.gain.linearRampToValueAtTime(i === 0 ? 0.14 : i === 1 ? 0.11 : 0.16, t + 0.012)
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55)
      osc1.start(t); osc1.stop(t + 0.6)
      osc2.start(t); osc2.stop(t + 0.6)
    })
  } catch(e) {}
}

function escapeHtml(text){
  if(!text) return ''
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code style="background:var(--bg-void);border:1px solid var(--border-default);border-radius:4px;padding:1px 5px;font-family:monospace;font-size:12.5px;color:#a8ff78">$1</code>')
    .replace(/_([^_]+)_/g,'<em>$1</em>')
}

// ══════════════════════════════════════════════════════════════════
// FILE UPLOAD  (attachments bucket in Supabase Storage)
// ══════════════════════════════════════════════════════════════════
async function handleFileUpload(convId, input) {
  const file = input.files?.[0]
  if (!file) return
  // Reset so same file can be selected again
  input.value = ''

  const MAX_MB = 20
  if (file.size > MAX_MB * 1024 * 1024) {
    toast(`File must be under ${MAX_MB}MB`, 'error'); return
  }

  const toastDuration = 8000
  toast('⏫ Uploading ' + file.name + '…', 'info', toastDuration)

  const ext  = file.name.split('.').pop()
  const safe = file.name.replace(/[^a-zA-Z0-9._-]/g, '_')
  const path = `${convId}/${Date.now()}_${safe}`

  const { error: upErr } = await window._db.storage
    .from('attachments')
    .upload(path, file, { contentType: file.type })

  if (upErr) {
    toast('Upload failed: ' + upErr.message, 'error'); return
  }

  // Generate a signed URL (attachments bucket is private)
  const { data: signed } = await window._db.storage
    .from('attachments')
    .createSignedUrl(path, 60 * 60 * 24 * 7) // 7-day signed URL

  const fileUrl = signed?.signedUrl || ''
  const isImage = file.type.startsWith('image/')
  const msgType = isImage ? 'image' : 'file'

  const { data, error: msgErr } = await window._db
    .from('messages')
    .insert({
      conversation_id: convId,
      sender_id:       myProfile.id,
      text:            file.name,
      type:            msgType,
      file_url:        fileUrl,
      file_name:       file.name,
      file_size:       file.size,
      file_mime:       file.type,
      is_anon:         anonMode[convId] || false,
    })
    .select()
    .single()

  if (msgErr) { toast('Could not send file: ' + msgErr.message, 'error'); return }

  // Update conversation timestamp
  await window._db.from('conversations')
    .update({ updated_at: new Date().toISOString() })
    .eq('id', convId)

  const conv = CONVERSATIONS.find(c => c.id === convId)
  if (conv && data) {
    conv.messages.push(mapMessage({ ...data, message_reactions: [], message_reads: [] }))
    conv.preview = isImage ? '🖼 Image' : '📎 ' + file.name
    conv.time    = formatMsgTime(data.created_at)
    renderMessages(convId)
    renderConversations()
  }
  toast('✅ File sent!', 'success')
}

let activeEmojiConvId = null

function toggleEmojiPicker(convId) {
  const wrap = document.getElementById('emoji-picker-wrap-' + convId)
  if (!wrap) return
  if (wrap.querySelector('.emoji-picker-pop')) {
    wrap.innerHTML = ''
    activeEmojiConvId = null
    return
  }
  activeEmojiConvId = convId
  const picker = document.createElement('div')
  picker.className = 'emoji-picker-pop'
  picker.onclick = e => e.stopPropagation()

  // Search bar
  picker.innerHTML = `<input placeholder="Search emoji…" style="width:100%;background:var(--bg-input);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:6px 10px;color:var(--text-primary);font-family:var(--font-body);font-size:13px;outline:none;margin-bottom:8px" oninput="filterEmojis(this.value,'${convId}')" id="emoji-search-${convId}"/>`
  picker.innerHTML += `<div id="emoji-body-${convId}" style="max-height:200px;overflow-y:auto">`

  for (const [cat, emojis] of Object.entries(EMOJI_DATA)) {
    picker.innerHTML += `<span class="emoji-cat-label">${cat}</span><div class="emoji-category" id="emoji-cat-${cat.replace(/\s/g,'')}-${convId}">`
    picker.innerHTML += emojis.map(em => `<button class="ep-btn" onclick="insertEmoji('${convId}','${em}')">${em}</button>`).join('')
    picker.innerHTML += '</div>'
  }
  picker.innerHTML += '</div>'

  wrap.appendChild(picker)
  document.getElementById('emoji-search-' + convId)?.focus()
}

function filterEmojis(q, convId) {
  const body = document.getElementById('emoji-body-' + convId)
  if (!body) return
  if (!q.trim()) {
    body.querySelectorAll('.ep-btn,.emoji-cat-label,.emoji-category').forEach(el => el.style.display = '')
    return
  }
  // Show only matching emojis, hide category labels for empty cats
  for (const [cat, emojis] of Object.entries(EMOJI_DATA)) {
    const catDiv = document.getElementById('emoji-cat-' + cat.replace(/\s/g,'') + '-' + convId)
    if (!catDiv) continue
    const btns = catDiv.querySelectorAll('.ep-btn')
    let visCount = 0
    btns.forEach(btn => {
      const match = btn.textContent.includes(q)
      btn.style.display = match ? '' : 'none'
      if (match) visCount++
    })
    const label = catDiv.previousElementSibling
    catDiv.style.display = visCount ? '' : 'none'
    if (label && label.classList.contains('emoji-cat-label')) label.style.display = visCount ? '' : 'none'
  }
}

function insertEmoji(convId, emoji) {
  const input = document.getElementById('msg-input-' + convId)
  if (!input) return
  const start = input.selectionStart
  const end   = input.selectionEnd
  input.value = input.value.slice(0, start) + emoji + input.value.slice(end)
  input.selectionStart = input.selectionEnd = start + emoji.length
  input.focus()
  handleInput({target: input}, convId)
  // Don't close picker — let user pick more
}

// Close emoji picker on outside click
document.addEventListener('click', e => {
  if (activeEmojiConvId) {
    const wrap = document.getElementById('emoji-picker-wrap-' + activeEmojiConvId)
    if (wrap && !wrap.contains(e.target)) {
      wrap.innerHTML = ''
      activeEmojiConvId = null
    }
  }
})

// VOICE RECORDER  (MediaRecorder API)
// ══════════════════════════════════════════════════════════════════
let voiceRecorder = null, voiceChunks = [], voiceTimerInterval = null, voiceSeconds = 0, voiceConvId = null

async function startVoiceRecording(convId) {
  if (voiceRecorder) return
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true })
    voiceConvId = convId
    voiceChunks = []
    voiceSeconds = 0
    voiceRecorder = new MediaRecorder(stream, { mimeType: MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg' })
    voiceRecorder.ondataavailable = e => { if (e.data.size > 0) voiceChunks.push(e.data) }
    voiceRecorder.start(100)

    // Show bar
    const bar = document.getElementById('voice-rec-bar-' + convId)
    if (bar) bar.style.display = 'flex'

    // Timer
    voiceTimerInterval = setInterval(() => {
      voiceSeconds++
      const mins = Math.floor(voiceSeconds / 60)
      const secs = (voiceSeconds % 60).toString().padStart(2, '0')
      const timer = document.getElementById('voice-timer-' + convId)
      if (timer) timer.textContent = `${mins}:${secs}`
      if (voiceSeconds >= 120) stopVoiceRecording(convId) // max 2 min
    }, 1000)
  } catch(err) {
    toast('Microphone access denied', 'error')
  }
}

async function stopVoiceRecording(convId) {
  if (!voiceRecorder) return
  clearInterval(voiceTimerInterval)
  voiceRecorder.stop()
  voiceRecorder.stream?.getTracks().forEach(t => t.stop())

  await new Promise(res => { voiceRecorder.onstop = res })
  voiceRecorder = null

  const bar = document.getElementById('voice-rec-bar-' + convId)
  if (bar) bar.style.display = 'none'

  if (voiceChunks.length === 0) return
  const mime = voiceChunks[0]?.type || 'audio/webm'
  const blob = new Blob(voiceChunks, { type: mime })
  const ext  = mime.includes('ogg') ? 'ogg' : 'webm'
  const file = new File([blob], `voice_${Date.now()}.${ext}`, { type: mime })

  // Upload as regular file
  await handleFileUpload(convId, { files: [file], value: '' })
  voiceChunks = []
}

function cancelVoiceRecording(convId) {
  if (voiceRecorder) {
    clearInterval(voiceTimerInterval)
    voiceRecorder.stop()
    voiceRecorder.stream?.getTracks().forEach(t => t.stop())
    voiceRecorder = null
    voiceChunks = []
  }
  const bar = document.getElementById('voice-rec-bar-' + convId)
  if (bar) bar.style.display = 'none'
}

// LINK PREVIEWS  (fetch via allorigins.win proxy)
// ══════════════════════════════════════════════════════════════════
const linkPreviewCache = {}

async function fetchLinkPreview(url) {
  if (linkPreviewCache[url]) return linkPreviewCache[url]
  try {
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`
    const r = await fetch(proxy, { signal: AbortSignal.timeout(5000) })
    const j = await r.json()
    const parser = new DOMParser()
    const doc = parser.parseFromString(j.contents, 'text/html')
    const getMeta = (prop, name) =>
      doc.querySelector(`meta[property="${prop}"]`)?.content ||
      doc.querySelector(`meta[name="${name}"]`)?.content || ''
    const preview = {
      title: getMeta('og:title','title') || doc.title?.slice(0,80) || '',
      desc:  getMeta('og:description','description')?.slice(0,160) || '',
      image: getMeta('og:image','') || '',
      domain: new URL(url).hostname.replace('www.',''),
      url,
    }
    linkPreviewCache[url] = preview
    return preview
  } catch(e) { return null }
}

function extractUrl(text) {
  const m = text.match(/https?:\/\/[^\s]+/)
  return m ? m[0] : null
}

async function renderLinkPreview(convId, msgId, url) {
  const data = await fetchLinkPreview(url)
  if (!data || !data.title) return
  const bubble = document.querySelector(`#msg-${msgId} .message-bubble`)
  if (!bubble || bubble.querySelector('.link-preview')) return
  const previewHtml = `<div class="link-preview" onclick="window.open('${data.url}','_blank')">
    ${data.image ? `<img src="${data.image}" style="width:100%;height:100px;object-fit:cover" onerror="this.style.display='none'" loading="lazy"/>` : ''}
    <div class="link-preview-body">
      <div class="link-preview-domain">${data.domain}</div>
      <div class="link-preview-title">${data.title}</div>
      ${data.desc ? `<div class="link-preview-desc">${data.desc}</div>` : ''}
    </div>
  </div>`
  bubble.insertAdjacentHTML('beforeend', previewHtml)
}

// ONLINE PRESENCE  (update is_online on open / close)
// ══════════════════════════════════════════════════════════════════
async function setOnlineStatus(isOnline) {
  if (!myProfile?.id) return
  await window._db.from('profiles').update({
    is_online: isOnline,
    last_seen_at: new Date().toISOString(),
  }).eq('id', myProfile.id)
}

// Set online when app boots, offline when tab is hidden / closed
window.addEventListener('focus', () => setOnlineStatus(true))
window.addEventListener('blur',  () => setOnlineStatus(false))
document.addEventListener('visibilitychange', () => {
  setOnlineStatus(document.visibilityState === 'visible')
})
window.addEventListener('beforeunload', () => setOnlineStatus(false))

function filterShareContacts(q) {
  const list = document.getElementById('share-contact-list')
  if (!list) return
  list.querySelectorAll('[data-name]').forEach(el => {
    el.style.display = el.getAttribute('data-name').includes(q.toLowerCase()) ? '' : 'none'
  })
}

async function sendContactCard(convId, contactUserId) {
  const u = USERS[contactUserId]
  if (!u) return

  const { data, error } = await window._db.from('messages').insert({
    conversation_id: convId,
    sender_id:       myProfile.id,
    text:            u.name,         // display name as text
    type:            'contact',      // custom type
    file_name:       contactUserId,  // reuse file_name to store userId
  }).select().single()

  if (error) { toast('Could not share contact', 'error'); return }

  await window._db.from('conversations').update({ updated_at: new Date().toISOString() }).eq('id', convId)

  const conv = CONVERSATIONS.find(c => c.id === convId)
  if (conv && data) {
    conv.messages.push(mapMessage({ ...data, message_reactions: [], message_reads: [] }))
    conv.preview = `👤 ${u.name}`
    conv.time    = formatMsgTime(data.created_at)
    renderMessages(convId)
    renderConversations()
  }
  toast(`👤 Shared ${u.name}'s contact`, 'success')
}

async function doForwardMsg(fromConvId, msgId) {
  const conv    = CONVERSATIONS.find(c => c.id === fromConvId)
  const msg     = conv?.messages.find(m => m.id === msgId)
  if (!msg) return
  const targets = [...document.querySelectorAll('input[id^="fwd-"]:checked')].map(el => el.value)
  if (targets.length === 0) { toast('Select at least one conversation', 'error'); return }

  for (const targetId of targets) {
    const { data, error } = await window._db.from('messages').insert({
      conversation_id: targetId,
      sender_id:       myProfile.id,
      text:            msg.isFile ? msg.fileName : msg.text,
      type:            msg.isFile ? (msg.fileMime?.startsWith('image') ? 'image' : 'file') : 'text',
      file_url:        msg.fileUrl || null,
      file_name:       msg.fileName || null,
      file_size:       null,
      file_mime:       msg.fileMime || null,
    }).select().single()
    if (!error && data) {
      const targetConv = CONVERSATIONS.find(c => c.id === targetId)
      if (targetConv) {
        targetConv.messages.push(mapMessage({ ...data, message_reactions: [], message_reads: [] }))
        targetConv.preview = '↪️ Forwarded: ' + (msg.text?.slice(0,40) || msg.fileName || '')
        targetConv.time = formatMsgTime(data.created_at)
        if (state.activeConvId === targetId) renderMessages(targetId)
      }
    }
  }
  await window._db.from('conversations').update({ updated_at: new Date().toISOString() }).in('id', targets)
  renderConversations()
  closeAllModals()
  toast(`↪️ Forwarded to ${targets.length} conversation${targets.length>1?'s':''}!`, 'success')
}

function showAddMemberModal(convId) {
  closeAllModals()
  const conv = CONVERSATIONS.find(c => c.id === convId)
  if (!conv || conv.type !== 'group') return
  const nonMembers = Object.values(USERS).filter(u => !conv.members.includes(u.id))
  const overlay = document.createElement('div')
  overlay.className = 'modal-overlay'
  overlay.onclick = e => { if (e.target === overlay) closeAllModals() }
  overlay.innerHTML = `<div class="modal pop-in" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h3 style="margin:0">➕ Add Member</h3>
      <button onclick="closeAllModals()" class="icon-btn">✕</button>
    </div>
    ${nonMembers.length === 0
      ? '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px">All users are already in this group.</div>'
      : `<div style="max-height:300px;overflow-y:auto">
          ${nonMembers.map(u => `
            <label class="forward-conv-item">
              <input type="checkbox" id="am-${u.id}" value="${u.id}"/>
              <div class="av" style="width:36px;height:36px;font-size:13px;flex-shrink:0;overflow:hidden">
                ${u.avatar_url ? `<img src="${u.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>` : u.initials}
              </div>

            </label>`).join('')}
        </div>
        <div class="btn-row">
          <button class="btn btn-ghost" onclick="closeAllModals()">Cancel</button>

  document.body.appendChild(overlay)
}

async function doAddMembers(convId) {
  const selected = [...document.querySelectorAll('input[id^="am-"]:checked')].map(el => el.value)
  if (selected.length === 0) { toast('Select at least one person', 'error'); return }
  const conv = CONVERSATIONS.find(c => c.id === convId)
  let added = 0
  for (const uid of selected) {
    // Use add_group_member RPC (security definer, bypasses RLS)
    const { error: insErr } = await window._db.rpc('add_group_member', {
      group_conv_id: convId,
      new_user_id: uid
    })
    if (!insErr) {
      if (conv && !conv.members.includes(uid)) conv.members.push(uid)
      added++
    }
  }
  closeAllModals()
  toast(`✅ Added ${added} member${added>1?'s':''}`, 'success')
}

async function recordStatusView(storyId, userId) {
  if (!userId || userId === myProfile.id) return
  await window._db.from('status_views').upsert(

    { onConflict: 'status_id,viewer_id', ignoreDuplicates: true }

}

function setSidebarWallpaper(id) {
  state.sidebarWallpaper = id
  persistSettings()
  applySidebarWallpaper(id)
  toast('Sidebar wallpaper updated', 'success')
}

function applySidebarWallpaper(id) {
  const canvas = document.getElementById('sidebar-wallpaper-canvas')
  if (!canvas) return
  if (id === 'none') { canvas.style.display = 'none'; return }
  const sidebar = document.getElementById('sidebar')
  canvas.width  = sidebar?.offsetWidth  || 300
  canvas.height = sidebar?.offsetHeight || 800
  canvas.style.display = 'block'
  const ctx = canvas.getContext('2d')
  ctx.clearRect(0, 0, canvas.width, canvas.height)
  const w = canvas.width, h = canvas.height
  const color = 'rgba(34,197,94,0.85)'

  if (id === 'dots') {
    ctx.fillStyle = color
    for (let x = 16; x < w; x += 22)
      for (let y = 16; y < h; y += 22) {
        ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI * 2); ctx.fill()
      }
  } else if (id === 'leaves') {
    ctx.font = '15px serif'; ctx.fillStyle = 'rgba(34,197,94,0.5)'
    const chars = ['✿', '❀', '❁', '✾', '⚘']
    let i = 0
    for (let x = 12; x < w; x += 46)
      for (let y = 12; y < h; y += 46)
        ctx.fillText(chars[i++ % chars.length], x + (y % 22), y)
  } else if (id === 'geo') {
    ctx.strokeStyle = color; ctx.lineWidth = 0.7
    for (let x = 0; x < w; x += 36)
      for (let y = 0; y < h; y += 36) {
        ctx.beginPath()
        ctx.moveTo(x + 18, y); ctx.lineTo(x + 36, y + 18)
        ctx.lineTo(x + 18, y + 36); ctx.lineTo(x, y + 18); ctx.closePath()
        ctx.stroke()
      }
  } else if (id === 'waves') {
    ctx.strokeStyle = color; ctx.lineWidth = 1.1
    for (let y = 20; y < h; y += 30) {
      ctx.beginPath()
      for (let x = 0; x < w; x += 2) {
        const wy = y + Math.sin((x / w) * Math.PI * 4) * 5
        x === 0 ? ctx.moveTo(x, wy) : ctx.lineTo(x, wy)
      }
      ctx.stroke()
    }
  } else if (id === 'grid') {
    ctx.strokeStyle = color; ctx.lineWidth = 0.5
    for (let x = 0; x < w; x += 28) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke()
    }
    for (let y = 0; y < h; y += 28) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke()
    }
  }
}

// ══════════════════════════════════════════════════════════════════
// LONG-PRESS CONTEXT MENU FOR MOBILE
// ══════════════════════════════════════════════════════════════════
let _lpTimer = null, _lpTriggered = false

function initLongPress() {
  // Long-press on conversation items → conv menu
  document.getElementById('conversations-list')?.addEventListener('touchstart', e => {
    const item = e.target.closest('.conv-item')
    if (!item) return
    // Extract convId from onclick="openConversation('xxx')"
    const onclickStr = item.getAttribute('onclick') || ''
    const m = onclickStr.match(/'([^']+)'/)
    if (!m) return
    const convId = m[1]
    _lpTriggered = false
    _lpTimer = setTimeout(() => {
      _lpTriggered = true
      if (navigator.vibrate) navigator.vibrate(40)
      showConvMenu({ preventDefault: () => {} }, convId)
    }, 500)
  }, { passive: true })

  document.getElementById('conversations-list')?.addEventListener('touchend', () => {
    clearTimeout(_lpTimer)
  })

  // Long-press on message bubbles → message menu
  document.body.addEventListener('touchstart', e => {
    const bubble = e.target.closest('.message-bubble')
    if (!bubble) return
    const row = bubble.closest('.message-row')
    if (!row) return
    const msgId  = row.getAttribute('data-msg-id')
    const convId = row.getAttribute('data-conv-id')
    const isOwn  = row.classList.contains('own')
    if (!msgId || !convId) return
    _lpTriggered = false
    _lpTimer = setTimeout(() => {
      _lpTriggered = true
      if (navigator.vibrate) navigator.vibrate(40)
      showMsgMenu({ preventDefault: () => {} }, convId, msgId, isOwn ? 'true' : 'false')
    }, 500)
  }, { passive: true })

  document.body.addEventListener('touchend', () => clearTimeout(_lpTimer))
  document.body.addEventListener('touchmove', () => clearTimeout(_lpTimer), { passive: true })
}

// ── Wire avatar clicks in sidebar to show user profile ───────────
document.addEventListener('click', e => {
  const avWrap = e.target.closest('#conversations-list .av-wrap')
  if (!avWrap) return
  const item = avWrap.closest('.conv-item')
  if (!item) return
  e.stopPropagation()
  const onclickStr = item.getAttribute('onclick') || ''
  const m = onclickStr.match(/'([^']+)'/)
  if (!m) return
  const convId = m[1]
  const conv = CONVERSATIONS.find(c => c.id === convId)
  if (conv?.type === 'dm' && conv.otherId) showUserProfile(conv.otherId)
})

// ── Wire chat header avatar to show profile ─────────────────────
document.addEventListener('click', e => {
  const avWrap = e.target.closest('.chat-header .av-wrap')
  if (!avWrap) return
  const conv = CONVERSATIONS.find(c => c.id === state.activeConvId)
  if (!conv) return
  if (conv.type === 'dm' && conv.otherId) showUserProfile(conv.otherId)
  else if (conv.type === 'group') showMembersPanel(conv.id)
})

// ── Wire sender avatar in messages to show profile ───────────────
document.addEventListener('click', e => {
  const avEl = e.target.closest('.msg-av .av')
  if (!avEl) return
  const row = avEl.closest('.message-row')
  if (!row || row.classList.contains('own')) return
  const convId = row.getAttribute('data-conv-id')
  const msgId  = row.getAttribute('data-msg-id')
  if (!convId || !msgId) return
  const conv = CONVERSATIONS.find(c => c.id === convId)
  const msg  = conv?.messages.find(m => m.id === msgId)
  if (msg?.senderId) showUserProfile(msg.senderId)
})

// ── Visual viewport: keep input above keyboard on iOS ──
if (window.visualViewport) {
  let rafPending=null
  const onVVResize=()=>{
    cancelAnimationFrame(rafPending)
    rafPending=requestAnimationFrame(()=>{
      if(!state.isMobile) return
      const vvh=window.visualViewport.height
      const app=document.getElementById('app')
      if(app) app.style.height=vvh+'px'
      const active=document.activeElement
      if(active&&(active.tagName==='TEXTAREA'||active.tagName==='INPUT')){
        setTimeout(()=>active.scrollIntoView({block:'nearest',behavior:'smooth'}),80)
      }
    })
  }
  window.visualViewport.addEventListener('resize',onVVResize)
  window.visualViewport.addEventListener('scroll',onVVResize)
}
</script>

<script>
// ══════════════════════════════════════════════════════════════════
// ICON INIT — render all SVG icons into their placeholders
// Called once on DOMContentLoaded
// ══════════════════════════════════════════════════════════════════
function initIcons() {
  // Bottom nav
  const navDefs = [
    ['nav-icon-chats',    'chats',    'chatsFill'],
    ['nav-icon-groups',   'groups',   'groupsFill'],
    ['nav-icon-status',   'status',   'statusFill'],
    ['nav-icon-calls',    'calls',    'callsFill'],
    ['nav-icon-settings', 'settings', 'settingsFill'],
  ]
  navDefs.forEach(([id, outline, fill]) => {
    const el = document.getElementById(id)
    if (el) el.innerHTML = icon(outline, 22)
    el && el.setAttribute('data-outline', outline)
    el && el.setAttribute('data-fill', fill)
  })
  updateNavIcons('chats')

  // FAB
  const fabEl = document.getElementById('fab-icon-el')
  if (fabEl) fabEl.innerHTML = icon('compose', 22)

  // Sidebar header
  const logoEl = document.getElementById('logo-icon-el')
  if (logoEl) logoEl.innerHTML = icon('leaf', 22)

  const btnSearch = document.getElementById('btn-search-sidebar')
  if (btnSearch) btnSearch.innerHTML = icon('search', 18)

  const btnNotifBell = document.getElementById('notif-bell-icon')
  if (btnNotifBell) btnNotifBell.innerHTML = icon('bell', 18)

  const btnMore = document.getElementById('btn-more-sidebar')
  if (btnMore) btnMore.innerHTML = icon('more', 18)

  const btnSettingsFooter = document.getElementById('btn-settings-footer')
  if (btnSettingsFooter) btnSettingsFooter.innerHTML = icon('settings', 18)

  const searchIconPos = document.getElementById('search-icon-pos-el')
  if (searchIconPos) searchIconPos.innerHTML = icon('search', 14)

  // Mobile back button (may not exist yet, so also called in openConversation)
  renderChatHeaderIcons()

  // Nav pill initial position
  positionNavPill('chats')
}

function renderChatHeaderIcons() {
  const btnBack = document.getElementById('btn-back-mobile')
  if (btnBack && !btnBack.innerHTML.trim()) btnBack.innerHTML = icon('back', 20)
}

function updateNavIcons(activeTab) {
  const tabMap = { chats:'chats', groups:'groups', status:'status', calls:'calls', settings:'settings' }
  Object.entries(tabMap).forEach(([tab, name]) => {
    const el = document.getElementById('nav-icon-' + tab)
    if (!el) return
    const isActive = tab === activeTab
    el.innerHTML = icon(isActive ? name + 'Fill' : name, 22)
    el.style.color = isActive ? 'var(--accent)' : ''
  })
}

function positionNavPill(activeTab) {
  const pill = document.getElementById('nav-pill')
  const activeBtn = document.getElementById('nav-' + activeTab)
  if (!pill || !activeBtn) return
  const nav = document.getElementById('bottom-nav')
  const navRect = nav.getBoundingClientRect()
  const btnRect = activeBtn.getBoundingClientRect()
  const pillW = Math.min(btnRect.width * 0.55, 52)
  const pillX = btnRect.left - navRect.left + (btnRect.width - pillW) / 2
  pill.style.width = pillW + 'px'
  pill.style.transform = `translateX(${pillX}px)`
}

document.addEventListener('DOMContentLoaded', initIcons)
</script>
