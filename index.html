.search-results-list{max-height:320px;overflow-y:auto;margin-top:12px}
.search-result-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--radius-md);cursor:pointer;transition:background .18s}
.search-result-item:hover{background:var(--bg-hover)}

/* Back button on mobile chat header */
.back-btn-mobile{display:none}

/* ── MOBILE ─────────────────────────────────────────────── */
@media(max-width:768px){
  :root{--sidebar-w:100vw;--header-h:52px}

  #app{flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

  .main-area{
    position:fixed;top:0;left:0;right:0;
    bottom:calc(60px + env(safe-area-inset-bottom,0px));
    display:flex;flex-direction:column;overflow:hidden;height:auto;
  }

  /* When in chat mode (nav hidden) main-area fills full height */

  .sidebar{
    position:fixed;top:0;left:0;right:0;
    bottom:calc(60px + env(safe-area-inset-bottom,0px));
    width:100vw!important;min-width:0!important;
    z-index:110;transform:translateX(-100%);
    transition:transform .28s cubic-bezier(0.4,0,0.2,1);overflow:hidden;
  }

  .sidebar-footer{display:none}
  .stories-bar{padding:8px 10px;flex-shrink:0}
  .chat-area{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
  .messages-container{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 10px 4px}

  .input-area{flex-shrink:0;padding:8px 10px 8px;position:relative;z-index:10}
  .feat-btns{flex-wrap:nowrap;margin-bottom:6px;gap:4px}
  .feat-btn{white-space:nowrap;flex-shrink:0;font-size:11px;padding:4px 10px}
  .input-row{gap:7px}
  .input-wrap{padding:8px 10px;border-radius:18px}
  .send-btn{width:38px;height:38px}

  /* ── BOTTOM NAV: visible on mobile by default ── */
  .bottom-nav{display:flex !important}
  /* hidden state: slide down */
  .bottom-nav.hidden{transform:translateY(110%) !important;opacity:0 !important;pointer-events:none !important}

  /* ── FAB: visible on mobile by default ── */
  .fab{display:flex !important}
  /* hidden state */
  .fab.hidden{opacity:0 !important;transform:translateY(20px) scale(0.8) !important;pointer-events:none !important}

  .message-bubble-wrap{max-width:80%}

  /* Modals sheet from bottom */
  .modal{max-width:100%!important;border-radius:24px 24px 0 0!important;margin:0}
  .modal-overlay{padding:0!important;align-items:flex-end}

  /* Back button shows on mobile */
  .back-btn-mobile{display:flex !important}
}

@media(max-width:480px){
  .message-bubble-wrap{max-width:86%}
  .chat-header-info h2{font-size:14px}
}

@supports(height:100dvh){
  #app{height:100dvh}
}

  const svg = ICONS[name]; if (!svg) return ''
  return svg.replace('<svg ', `<svg width="${size}" height="${size}" class="si ${cls}" `)
}

// ══════════════════════════════════════════════════════════════════
// LEAFY — SUPABASE-WIRED APP
// All data comes from / goes to Supabase. No hardcoded mock data.
// ══════════════════════════════════════════════════════════════════

// ── Runtime state ────────────────────────────────────────────────
let currentUser  = null   // Supabase auth user
let myProfile    = {}     // row from profiles table
let CONVERSATIONS = []    // loaded from Supabase
let USERS        = {}     // profiles of contacts, keyed by uuid
let NOTIFICATIONS = []    // from notifications table
let ME           = { id: '', name: '', username: '', initials: '', status: 'online' }

const convMeta       = {}  // { [convId]: { muted, archived, pinnedMsgId } }
const starredMessages = [] // populated from starred_messages table
const anonMode       = {}
const replyTo        = {}
const drafts         = {}  // { [convId]: string } — auto-saved drafts
const editMode       = {}  // { [convId]: msgId } — message currently being edited
let mentionPopupConv = null

let state = {
  activeConvId:   null,
  tab:            'all',
  theme:          localStorage.getItem('leafy-theme') || 'dark',
  accentColor:    localStorage.getItem('leafy-accent') || '#22c55e',
  isMobile:       window.innerWidth <= 768,
  sidebarOpen:    false,
  typingTimer:    null,
  typingConvId:   null,
  typingConvIdUser: null,
  brightness:     1,
  fontSize:       1,
  density:        'comfortable',
  bubbleStyle:    'default',
  chatBackground: 'none',
  notif_sounds:   true,
  notif_vibrate:  true,
  notif_preview:  true,
  notif_groups:   false,
  privacy_receipts: true,
  privacy_online:   true,
  privacy_lastseen: true,
}

// ── Realtime subscription handles ────────────────────────────────
let msgSubscription  = null
let convSubscription = null
let typingChannel    = null
let typingTimeout    = null
let typingBroadcastTimeout = null
let _typingConvId    = null   // conv showing typing in sidebar
let _typingConvUser  = null

// ══════════════════════════════════════════════════════════════════
// INIT — session restore & boot
// ══════════════════════════════════════════════════════════════════
window.addEventListener('load', async () => {
  if (!window._db) {
    // Keys not set yet — show login after splash
    setTimeout(() => {
      document.getElementById('splash').classList.add('hide')
      setTimeout(() => {
        document.getElementById('splash').style.display = 'none'
        showLoginScreen()
      }, 580)
    }, 2000)
    return
  }

  const { data: { session } } = await window._db.auth.getSession()
  if (session) {
    currentUser = session.user
    await bootApp()
  } else {
    setTimeout(() => {
      document.getElementById('splash').classList.add('hide')
      setTimeout(() => {
        document.getElementById('splash').style.display = 'none'
        showLoginScreen()
      }, 580)
    }, 2200)
  }

  window._db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session && !currentUser) {
      currentUser = session.user
      await bootApp()
    } else if (event === 'SIGNED_OUT') {
      currentUser = null
    }
  })
})

window.addEventListener('resize', () => {
  const wasMobile = state.isMobile
  state.isMobile = window.innerWidth <= 768
  if (!state.isMobile && wasMobile) {
    closeSidebar()
    if (CONVERSATIONS.length > 0 && !state.activeConvId) openConversation(CONVERSATIONS[0].id)
  }
})

// ── Boot sequence after login ─────────────────────────────────────
async function bootApp() {
  await loadMyProfile(currentUser.id)
  await loadSettings()
  setOnlineStatus(true).catch(()=>{})
  await loadContacts()
  await loadConversations()
  await loadNotifications()
  await loadStarredMessages()
  launchApp()
}

// ══════════════════════════════════════════════════════════════════
// PROFILE
// ══════════════════════════════════════════════════════════════════
async function loadMyProfile(userId) {
  const { data } = await window._db
    .from('profiles')
    .select('*')
    .eq('id', userId)
    .single()

  if (data) {
    const initials = (data.display_name || data.username || 'U')
      .split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase()
    myProfile = {
      id:         data.id,
      name:       data.display_name || data.username || 'User',
      username:   data.username || '',
      bio:        data.bio || '',
      initials,
      avatar_url: data.avatar_url || null,
      show_online:    data.show_online,
      show_last_seen: data.show_last_seen,
      read_receipts:  data.read_receipts,
    }
    ME = { id: data.id, name: myProfile.name, username: myProfile.username, initials, status: 'online' }
  } else {
    // Auto-create profile row — use ignoreDuplicates in case trigger already ran
    const email   = currentUser.email || ''
    const name    = currentUser.user_metadata?.display_name || email.split('@')[0] || 'User'
    const username = email.split('@')[0].replace(/[^a-z0-9_]/gi,'').toLowerCase() || 'user'
    const initials = name.slice(0,2).toUpperCase()
    await window._db.from('profiles').upsert(
      { id: userId, display_name: name, username },
      { onConflict: 'id', ignoreDuplicates: true }
    )
    myProfile = { id: userId, name, username, bio: '', initials, avatar_url: null }
    ME = { id: userId, name, username, initials, status: 'online' }
  }
}

async function saveProfile() {
  const name     = document.getElementById('ep-name')?.value.trim()
  const username = document.getElementById('ep-username')?.value.trim().replace('@','')
  const bio      = document.getElementById('ep-bio')?.value.trim()
  const avatarFile = document.getElementById('ep-avatar-file')?.files?.[0]
  if (!name) { toast('Name cannot be empty', 'error'); return }

  let avatar_url = myProfile.avatar_url

  // FIX: Upload avatar to Supabase Storage if a new file was selected
  if (avatarFile) {
    if (avatarFile.size > 5 * 1024 * 1024) { toast('Photo must be under 5MB', 'error'); return }
    const ext  = avatarFile.name.split('.').pop()
    const path = `${myProfile.id}/avatar_${Date.now()}.${ext}`
    const { error: upErr } = await window._db.storage
      .from('avatars')
      .upload(path, avatarFile, { upsert: true, contentType: avatarFile.type })
    if (upErr) { toast('Photo upload failed: ' + upErr.message, 'error'); return }
    const { data: urlData } = window._db.storage.from('avatars').getPublicUrl(path)
    avatar_url = urlData.publicUrl
  }

  const { error } = await window._db
    .from('profiles')
    .update({ display_name: name, username: username || myProfile.username, bio, avatar_url, updated_at: new Date().toISOString() })
    .eq('id', myProfile.id)

  if (error) { toast('Could not save profile: ' + error.message, 'error'); return }

  myProfile.name     = name
  myProfile.username = username || myProfile.username
  myProfile.bio      = bio
  myProfile.avatar_url = avatar_url
  myProfile.initials = name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase()
  ME.name = name
  updateSidebarProfile()
  closeAllModals()
  toast('✅ Profile updated!', 'success')
}

// ══════════════════════════════════════════════════════════════════
// SETTINGS (user_settings table)
// ══════════════════════════════════════════════════════════════════
async function loadSettings() {
  const { data } = await window._db
    .from('user_settings')
    .select('*')
    .eq('user_id', myProfile.id)
    .single()

  if (data) {
    state.theme          = data.theme          || 'dark'
    state.accentColor    = data.accent_color   || '#22c55e'
    state.fontSize       = data.font_size      || 1
    state.density        = data.density        || 'comfortable'
    state.bubbleStyle    = data.bubble_style   || 'default'
    state.chatBackground = data.chat_background|| 'none'
    state.brightness     = data.brightness     || 1
    state.notif_sounds   = data.notif_sounds   ?? true
    state.notif_vibrate  = data.notif_vibrate  ?? true
    state.notif_preview  = data.notif_preview  ?? true
    state.notif_groups   = data.notif_groups   ?? false
    state.sidebarWallpaper = data.sidebar_wallpaper || 'none'

    // Apply persisted theme
    document.documentElement.setAttribute('data-theme', state.theme)
    document.documentElement.style.setProperty('--accent', state.accentColor)
    document.documentElement.style.setProperty('--brightness', state.brightness)
    document.documentElement.style.setProperty('--font-size-scale', state.fontSize)
    if (state.bubbleStyle !== 'default') document.body.setAttribute('data-bubble', state.bubbleStyle)
    applyDensity(state.density)
    if (state.sidebarWallpaper && state.sidebarWallpaper !== 'none') applySidebarWallpaper(state.sidebarWallpaper)
  }
}

async function persistSettings() {
  if (!myProfile.id) return
  await window._db.from('user_settings').upsert({
    user_id:        myProfile.id,
    theme:          state.theme,
    accent_color:   state.accentColor,
    font_size:      state.fontSize,
    density:        state.density,
    bubble_style:   state.bubbleStyle,
    chat_background:state.chatBackground,
    brightness:     state.brightness,
    notif_sounds:   state.notif_sounds,
    notif_vibrate:  state.notif_vibrate,
    notif_preview:  state.notif_preview,
    notif_groups:   state.notif_groups,
    sidebar_wallpaper: state.sidebarWallpaper || 'none',
    updated_at:     new Date().toISOString(),
  })
}

// ══════════════════════════════════════════════════════════════════
// CONTACTS  (all profiles except self)
// ══════════════════════════════════════════════════════════════════
async function loadContacts() {
  const { data } = await window._db
    .from('profiles')
    .select('id,username,display_name,bio,avatar_url,is_online,last_seen_at')
    .neq('id', myProfile.id)

  USERS = {}
  if (data) {
    data.forEach(p => {
      const initials = (p.display_name || p.username || '?')
        .split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase()
      USERS[p.id] = {
        id:         p.id,
        name:       p.display_name || p.username || 'User',
        username:   p.username || '',
        initials,
        bio:        p.bio || '',
        avatar_url: p.avatar_url || null,
        status:     p.is_online ? 'online' : 'offline',
        last_seen:  p.last_seen_at || null,
      }
    })
  }
}

// ══════════════════════════════════════════════════════════════════
// CONVERSATIONS  (conversation_previews view + members)
// ══════════════════════════════════════════════════════════════════
async function loadConversations() {
  // Get all conversation IDs this user belongs to
  const { data: memberRows } = await window._db
    .from('conversation_members')
    .select('conversation_id, muted, archived, pinned_msg_id, last_read_at, pinned_conv')
    .eq('user_id', myProfile.id)
    .is('left_at', null)

  if (!memberRows || memberRows.length === 0) { CONVERSATIONS = []; return }

  const convIds = memberRows.map(r => r.conversation_id)

  // Build convMeta from member rows
  memberRows.forEach(r => {
    convMeta[r.conversation_id] = {
      muted:        r.muted || false,
      archived:     r.archived || false,
      pinnedMsgId:  r.pinned_msg_id || null,
      pinnedConv:   r.pinned_conv || false,
      last_read_at: r.last_read_at,
    }
  })

  // Load conversation details + last message via the view
  const { data: previews } = await window._db
    .from('conversation_previews')
    .select('*')
    .in('id', convIds)
    .order('last_message_at', { ascending: false, nullsFirst: false })

  // Load member lists for groups
  const { data: allMembers } = await window._db
    .from('conversation_members')
    .select('conversation_id, user_id, role')
    .in('conversation_id', convIds)
    .is('left_at', null)

  const membersByConv = {}
  if (allMembers) {
    allMembers.forEach(m => {
      if (!membersByConv[m.conversation_id]) membersByConv[m.conversation_id] = []
      membersByConv[m.conversation_id].push(m.user_id)
    })
  }

  // Count unread per conversation
  const unreadCounts = {}
  for (const convId of convIds) {
    const meta = convMeta[convId]
    const lastRead = meta?.last_read_at
    if (lastRead) {
      const { count } = await window._db
        .from('messages')
        .select('id', { count: 'exact', head: true })
        .eq('conversation_id', convId)
        .gt('created_at', lastRead)
        .neq('sender_id', myProfile.id)
        .is('deleted_at', null)
      unreadCounts[convId] = count || 0
    } else {
      unreadCounts[convId] = 0
    }
  }

  CONVERSATIONS = (previews || []).map(p => {
    const members = membersByConv[p.id] || []
    // For DMs, find the other user
    const otherId = p.type === 'dm'
      ? (p.dm_user_a === myProfile.id ? p.dm_user_b : p.dm_user_a)
      : null
    const otherUser = otherId ? USERS[otherId] : null

    const previewText = p.last_message_text
      ? (p.last_message_sender_id === myProfile.id ? 'You: ' : '') + p.last_message_text.slice(0,60)
      : 'No messages yet'

    const timeLabel = p.last_message_at
      ? formatMsgTime(p.last_message_at)
      : ''

    return {
      id:       p.id,
      type:     p.type,
      name:     p.type === 'dm' ? (otherUser?.name || 'Unknown') : (p.name || 'Group'),
      otherId,
      members,
      mood:     p.mood || 'default',
      avatar_url: p.avatar_url || null,
      preview:  previewText,
      time:     timeLabel,
      unread:   unreadCounts[p.id] || 0,
      messages: [], // loaded on demand when conversation is opened
    }
  })

  // Subscribe to realtime updates for all conversations
  subscribeToConversations(convIds)
}

function formatMsgTime(isoStr) {
  if (!isoStr) return ''
  const d = new Date(isoStr)
  const now = new Date()
  const diffDays = Math.floor((now - d) / 86400000)
  if (diffDays === 0) return d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
  if (diffDays === 1) return 'Yesterday'
  if (diffDays < 7)  return d.toLocaleDateString([], { weekday:'short' })
  return d.toLocaleDateString([], { month:'short', day:'numeric' })
}

function formatLastSeen(isoStr) {
  if (!isoStr) return 'last seen a while ago'
  const d   = new Date(isoStr)
  const now = new Date()
  const diffMin = Math.floor((now - d) / 60000)
  if (diffMin < 1)  return 'last seen just now'
  if (diffMin < 60) return `last seen ${diffMin}m ago`
  const diffHr = Math.floor(diffMin / 60)
  if (diffHr < 24)  return `last seen ${diffHr}h ago`
  const diffDays = Math.floor(diffHr / 24)
  if (diffDays === 1) return 'last seen yesterday'
  if (diffDays < 7)  return `last seen ${diffDays} days ago`
  return 'last seen ' + d.toLocaleDateString([], { month:'short', day:'numeric' })
}

function formatDateLabel(isoStr) {
  if (!isoStr) return 'Today'
  const d   = new Date(isoStr)
  const now = new Date()
  const diffDays = Math.floor((now - d) / 86400000)
  if (diffDays === 0) return 'Today'
  if (diffDays === 1) return 'Yesterday'
  return d.toLocaleDateString([], { weekday:'long', month:'long', day:'numeric' })
}

// ══════════════════════════════════════════════════════════════════
// MESSAGES  (messages table)
// ══════════════════════════════════════════════════════════════════
async function loadMessages(convId) {
  const { data } = await window._db
    .from('messages')
    .select(`
      id, sender_id, text, type, created_at, is_anon, is_destruct, expires_at,
      file_url, file_name, file_size, file_mime,
      reply_to_id, is_edited, edited_at,
      message_reactions ( id, emoji, user_id ),
      message_reads ( user_id )
    `)
    .eq('conversation_id', convId)
    .is('deleted_at', null)
    .order('created_at', { ascending: true })
    .limit(100)

  const conv = CONVERSATIONS.find(c => c.id === convId)
  if (!conv) return

  conv.messages = (data || []).map(m => mapMessage(m))
}

function mapMessage(m) {
  const isOwn = m.sender_id === myProfile.id
  const sender = USERS[m.sender_id]

  // Reactions grouped by emoji
  const reactionMap = {}
  ;(m.message_reactions || []).forEach(r => {
    if (!reactionMap[r.emoji]) reactionMap[r.emoji] = { emoji: r.emoji, count: 0, mine: false }
    reactionMap[r.emoji].count++
    if (r.user_id === myProfile.id) reactionMap[r.emoji].mine = true
  })

  const readBy = (m.message_reads || []).some(r => r.user_id !== myProfile.id)
  // Delivery status: 'read' > 'delivered' (DB confirmed) > 'sent' (optimistic)
  const deliveryStatus = readBy ? 'read' : (m.id && !m._optimistic ? 'delivered' : 'sent')

  return {
    id:        m.id,
    sender:    isOwn ? 'me' : m.sender_id,
    senderId:  m.sender_id,
    isAnon:    m.is_anon || false,
    text:      m.text || '',
    time:      new Date(m.created_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }),
    date:      formatDateLabel(m.created_at),
    reactions: Object.values(reactionMap),
    readBy,
    deliveryStatus,
    isDestruct: m.is_destruct || false,
    isFile:    m.type === 'file' || m.type === 'image',
    fileUrl:   m.file_url || '',
    fileMime:  m.file_mime || '',
    fileType:  m.file_mime?.startsWith('image') ? '🖼️' : '📄',
    fileName:  m.file_name || '',
    fileSize:  m.file_size ? (m.file_size > 1048576 ? (m.file_size/1048576).toFixed(1)+' MB' : (m.file_size/1024).toFixed(0)+' KB') : '',
    isCode:    m.type === 'code',
    isContact: m.type === 'contact',
    contactId: m.file_name || null,
    isEdited:  m.is_edited || false,
    editedAt:  m.edited_at ? new Date(m.edited_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : null,
    editedAt:  m.edited_at || null,
    replyTo:   m.reply_to_id ? { msgId: m.reply_to_id, text: '', senderName: '' } : null,
  }
}

async function sendMsg(id) {
  // If in edit mode, submit the edit instead
  if (editMode[id]) { await submitEdit(id); return }

  const input = document.getElementById('msg-input-' + id)
  if (!input) return
  const text = input.value.trim()
  if (!text) return

  // Clear draft
  delete drafts[id]

  input.value = ''
  input.style.height = 'auto'
  cancelReply(id)
  closeMentionPopup(id)

  const reply = replyTo[id] || null

  const { data, error } = await window._db
    .from('messages')
    .insert({
      conversation_id: id,
      sender_id:       myProfile.id,
      text,
      type:            'text',
      is_anon:         anonMode[id] || false,
      reply_to_id:     reply?.msgId || null,
    })
    .select()
    .single()

  if (error) { toast('Failed to send message', 'error'); return }

  // Dispatch mention notifications
  const mentionMatches = [...(text.matchAll(/@(\w+)/g))]
  if (mentionMatches.length > 0) {
    const conv = CONVERSATIONS.find(c => c.id === id)
    mentionMatches.forEach(match => {
      const uname = match[1]
      const mentionedUser = Object.values(USERS).find(u => u.username === uname)
      if (mentionedUser && mentionedUser.id !== myProfile.id) {
        window._db.from('notifications').insert({
          user_id:    mentionedUser.id,
          type:       'mention',
          title:      `${myProfile.name} mentioned you`,
          body:       text.slice(0, 80),
          conv_id:    id,
          sender_id:  myProfile.id,
        }).then(()=>{}).catch(()=>{})
      }
    })
  }

  // Update conversation updated_at so it rises to top
  await window._db.from('conversations')
    .update({ updated_at: new Date().toISOString() })
    .eq('id', id)

  const conv = CONVERSATIONS.find(c => c.id === id)
  if (conv && data) {
    conv.messages.push(mapMessage({ ...data, message_reactions: [], message_reads: [] }))
    conv.preview = text
    conv.time    = formatMsgTime(data.created_at)
    renderMessages(id)
    renderConversations()
  }
}

// ══════════════════════════════════════════════════════════════════
// REACTIONS  (message_reactions table)
// ══════════════════════════════════════════════════════════════════
async function toggleReaction(convId, msgId, emoji) {
  const conv = CONVERSATIONS.find(c => c.id === convId)
  const msg  = conv?.messages.find(m => m.id === msgId)
  if (!msg) return

  const existing = msg.reactions.find(r => r.emoji === emoji)
  if (existing && existing.mine) {
    // Remove reaction
    await window._db.from('message_reactions')
      .delete()
      .eq('message_id', msgId)
      .eq('user_id', myProfile.id)
      .eq('emoji', emoji)
    existing.count--
    existing.mine = false
    if (existing.count <= 0) msg.reactions = msg.reactions.filter(r => r.emoji !== emoji)
  } else {
    // Add reaction
    await window._db.from('message_reactions')
      .upsert({ message_id: msgId, user_id: myProfile.id, emoji })
    if (existing) { existing.count++; existing.mine = true }
    else msg.reactions.push({ emoji, count: 1, mine: true })
  }
  renderMessages(convId)
}

// POLLS  (polls + poll_options + poll_votes tables)

async function createPoll(convId) {
  const q  = document.getElementById('poll-q')?.value.trim()
  const o1 = document.getElementById('poll-o1')?.value.trim()
  const o2 = document.getElementById('poll-o2')?.value.trim()
  const o3 = document.getElementById('poll-o3')?.value.trim()
  if (!q || !o1 || !o2) { toast('Question and at least 2 options required', 'error'); return }

  // Insert message of type poll
  const { data: msgData, error: msgErr } = await window._db
    .from('messages')
    .insert({ conversation_id: convId, sender_id: myProfile.id, text: q, type: 'poll' })
    .select().single()
  if (msgErr) { toast('Failed to create poll', 'error'); return }

  // Insert poll row
  const { data: pollData } = await window._db
    .from('polls')
    .insert({ message_id: msgData.id, question: q })
    .select().single()

  // Insert options
  const options = [o1, o2, ...(o3 ? [o3] : [])].map((text, i) => ({ poll_id: pollData.id, text, position: i }))
  await window._db.from('poll_options').insert(options)

  // Local update
  const conv = CONVERSATIONS.find(c => c.id === convId)
  if (conv) {
    conv.messages.push({
      id: msgData.id, sender: 'me', text: q, time: formatMsgTime(msgData.created_at),
      date: 'Today', reactions: [], isPoll: true,
      poll: { id: pollData.id, question: q, options: options.map(o => ({ text: o.text, votes: 0 })), totalVotes: 0, userVote: null }
    })
    renderMessages(convId)
  }
  closeAllModals()
  toast('Poll created! 🗳️', 'success')
}

async function votePoll(convId, msgId, optionIndex) {
  const conv = CONVERSATIONS.find(c => c.id === convId)
  const msg  = conv?.messages.find(m => m.id === msgId)
  if (!msg?.poll) return
  if (msg.poll.userVote === optionIndex) return

  // Remove old vote
  if (msg.poll.userVote !== null && msg.poll.userVote !== undefined) {
    await window._db.from('poll_votes').delete()
      .eq('poll_id', msg.poll.id).eq('user_id', myProfile.id)
    msg.poll.options[msg.poll.userVote].votes--
    msg.poll.totalVotes--
  }

  // Get option id
  const { data: opts } = await window._db.from('poll_options')
    .select('id').eq('poll_id', msg.poll.id).order('position')
  const optionId = opts?.[optionIndex]?.id
  if (!optionId) return

  await window._db.from('poll_votes').insert({ poll_id: msg.poll.id, poll_option_id: optionId, user_id: myProfile.id })
  msg.poll.options[optionIndex].votes++
  msg.poll.totalVotes++
  msg.poll.userVote = optionIndex
  renderMessages(convId)
  toast('Vote recorded! 🗳️', 'success')
}

async function toggleStarMsg(convId, msgId) {

      .delete().eq('user_id', myProfile.id).eq('message_id', msgId)

    toast('Message unstarred', 'info')

    await window._db.from('starred_messages')
      .upsert({ user_id: myProfile.id, message_id: msgId, conversation_id: convId })
    const conv = CONVERSATIONS.find(c => c.id === convId)
    const msg  = conv?.messages.find(m => m.id === msgId)

async function startDM(otherUserId) {
  // Check if DM already exists locally first
  const existing = CONVERSATIONS.find(c =>
    c.type === 'dm' && c.otherId === otherUserId
  )
  if (existing) { openConversation(existing.id); closeAllModals(); return }

  // Call server-side RPC which runs as SECURITY DEFINER (bypasses RLS)
  // This creates the conversation + both member rows atomically
  const { data: convId, error } = await window._db.rpc('create_dm', {
    other_user_id: otherUserId
  })

  if (error) {
    toast('Could not start chat: ' + error.message, 'error')
    console.error('startDM error:', error)
    return
  }

  const otherUser = USERS[otherUserId]
  const newConv = {
    id: convId, type: 'dm', otherId: otherUserId,
    name: otherUser?.name || 'Unknown',
    members: [myProfile.id, otherUserId],
    mood: 'default', preview: 'No messages yet', time: '', unread: 0, messages: []
  }
  CONVERSATIONS.unshift(newConv)
  renderConversations()
  openConversation(convId)
  closeAllModals()
}

async function createGroup() {
  const name = document.getElementById('new-group-name')?.value.trim()
  const desc = document.getElementById('new-group-desc')?.value.trim()
  if (!name) { toast('Please enter a group name', 'error'); return }

  // Use SECURITY DEFINER RPC to bypass RLS chicken-and-egg
  const { data: convId, error } = await window._db.rpc('create_group', {
    group_name: name,
    group_desc: desc || ''
  })
  if (error) {
    toast('Could not create group: ' + error.message, 'error')
    console.error('createGroup error:', error)
    return
  }

  const newConv = {
    id: convId, type: 'group', name,
    members: [myProfile.id], mood: 'default',
    preview: 'Group created 🎉', time: '', unread: 0, messages: []
  }
  CONVERSATIONS.unshift(newConv)
  renderConversations()
  openConversation(convId)
  closeAllModals()
  toast(`Group "${name}" created! 🎉 Add members via the 👥 button`, 'success')
  // Immediately open add-member modal so creator can add people
  setTimeout(() => showAddMemberModal(convId), 600)
}

// ══════════════════════════════════════════════════════════════════
// REALTIME SUBSCRIPTIONS
// ══════════════════════════════════════════════════════════════════
function subscribeToConversations(convIds) {
  // Unsubscribe old
  if (msgSubscription)  window._db.removeChannel(msgSubscription)
  if (convSubscription) window._db.removeChannel(convSubscription)

  if (!convIds || convIds.length === 0) return

  // New messages in any conversation
  msgSubscription = window._db
    .channel('messages-realtime')
    .on('postgres_changes', {
      event:  'INSERT',
      schema: 'public',
      table:  'messages',
      filter: `conversation_id=in.(${convIds.join(',')})`,
    }, payload => {
      const msg  = payload.new
      const conv = CONVERSATIONS.find(c => c.id === msg.conversation_id)
      if (!conv) return

      // Don't duplicate own sent messages (already added locally)
      if (msg.sender_id === myProfile.id) return

      conv.messages.push(mapMessage({ ...msg, message_reactions: [], message_reads: [] }))
      const isFile = msg.type === 'image' || msg.type === 'file'
      conv.preview = isFile ? '📎 ' + (msg.file_name || 'File') : (msg.text?.slice(0,60) || '')
      conv.time    = formatMsgTime(msg.created_at)

      const isMuted = convMeta[conv.id]?.muted
      const isActive = state.activeConvId === conv.id

      if (!isActive) conv.unread++

      renderConversations()
      if (isActive) renderMessages(conv.id)
      updateNotifBadge()

      // ── Notification firing ──────────────────────────────────
      if (!isMuted) {
        const sender = USERS[msg.sender_id] || { name: 'Someone' }
        const convName = conv.name
        const body = state.notif_preview
          ? (isFile ? '📎 Sent a file' : (msg.text?.slice(0,80) || ''))
          : 'New message'
        const title = state.notif_preview ? sender.name : convName

        // Add to in-app NOTIFICATIONS array
        const notif = {
          id: msg.id,
          type: 'message',
          body: `${sender.name}: ${body}`,
          conversation_id: conv.id,
          read: false,
          created_at: msg.created_at,
        }
        NOTIFICATIONS.unshift(notif)
        if (NOTIFICATIONS.length > 50) NOTIFICATIONS.pop()

        // Sound
        if (state.notif_sounds) playNotifSound()

        // Vibration
        if (state.notif_vibrate && navigator.vibrate) navigator.vibrate([120, 60, 80])

        // Browser push notification (only when tab not focused)
        if (!document.hasFocus() && Notification.permission === 'granted') {
          try {
            const n = new Notification(title, {
              body,
              icon: '/favicon.ico',
              badge: '/favicon.ico',
              tag: conv.id,     // replaces previous notif for same conv
              renotify: true,
            })
            n.onclick = () => {
              window.focus()
              openConversation(conv.id)
              n.close()
            }
            if (!state.notif_groups && conv.type === 'group') {
              n.close() // suppress group notifs if setting is off
            }
          } catch(e) {}
        }

        // Write notification row to DB (so other devices/sessions see it)
        window._db.from('notifications').insert({
          user_id: myProfile.id,
          type: 'message',
          body: `${sender.name}: ${body}`,
          conversation_id: conv.id,
          message_id: msg.id,
          actor_id: msg.sender_id,
        }).then(() => {}).catch(() => {})
      }
    })
    .subscribe()

  // ── Typing indicators via Broadcast ─────────────────────────
  typingChannel = window._db
    .channel('typing-' + convIds.join('-').slice(0, 50))
    .on('broadcast', { event: 'typing' }, ({ payload }) => {
      if (payload.userId === myProfile.id) return
      if (payload.convId !== state.activeConvId) return
      const row = document.getElementById('typing-row')
      const conv = CONVERSATIONS.find(c => c.id === payload.convId)
      const sender = USERS[payload.userId] || { name: 'Someone' }
      if (!row || !conv) return
      if (payload.isTyping) {
        row.querySelector('span').textContent = `${sender.name} is typing…`
        row.style.opacity = '1'
        row.style.pointerEvents = 'auto'
        // Also track in state for sidebar conv list indicator
        _typingConvId = payload.convId
        _typingConvUser = payload.userId
        renderConversations()
        // Auto-hide after 3 seconds of no updates
        clearTimeout(typingTimeout)
        typingTimeout = setTimeout(() => {
          row.style.opacity = '0'
          row.style.pointerEvents = 'none'
          _typingConvId = null
          _typingConvUser = null
          renderConversations()
        }, 3000)
      } else {
        row.style.opacity = '0'
        row.style.pointerEvents = 'none'
        _typingConvId = null
        _typingConvUser = null
        renderConversations()
      }
    })
    .subscribe()

  // Profile online status changes
  window._db
    .channel('profiles-online')
    .on('postgres_changes', {
      event:  'UPDATE',
      schema: 'public',
      table:  'profiles',
    }, payload => {
      const p = payload.new
      if (USERS[p.id]) {
        USERS[p.id].status = p.is_online ? 'online' : 'offline'
        USERS[p.id].last_seen = p.last_seen_at
        // Refresh chat header sub-line if this user is active DM partner
        const activeConv = CONVERSATIONS.find(c => c.id === state.activeConvId)
        if (activeConv?.type === 'dm' && activeConv.otherId === p.id) {
          const subEl = document.querySelector('.chat-header .sub')
          if (subEl) subEl.textContent = p.is_online ? 'online' : formatLastSeen(p.last_seen_at)
        }
      }
    })
    .subscribe()

  // Notifications realtime — new notifs from DB trigger or other device
  window._db
    .channel('notifications-realtime')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'notifications',
      filter: `user_id=eq.${myProfile.id}`,
    }, payload => {
      const n = payload.new
      // Avoid duplication — already added locally in message handler
      if (!NOTIFICATIONS.find(x => x.id === n.id)) {
        NOTIFICATIONS.unshift(n)
        updateNotifBadge()
      }
    })
    .subscribe()

  // message_reads realtime — live "read" receipt updates for sent messages
  window._db
    .channel('message-reads-realtime')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'message_reads',
    }, payload => {
      handleMessageRead(payload)
    })
    .subscribe()
}

async function deleteMsg(convId, msgId) {
  await window._db.from('messages').update({
    deleted_at: new Date().toISOString(),
    deleted_by: myProfile.id,
  }).eq('id', msgId).eq('sender_id', myProfile.id)

  const conv = CONVERSATIONS.find(c => c.id === convId)

    conv.messages = conv.messages.filter(m => m.id !== msgId)
    renderMessages(convId)
  }
  toast('Message deleted', 'info')
}

// CONVERSATION MEMBER META  (mute / archive / pin via conversation_members)
// ══════════════════════════════════════════════════════════════════
async function togglePinConv(convId) {
  if (!convMeta[convId]) convMeta[convId] = {}
  convMeta[convId].pinnedConv = !convMeta[convId].pinnedConv
  // Persist — requires: ALTER TABLE conversation_members ADD COLUMN IF NOT EXISTS pinned_conv boolean DEFAULT false;
  window._db.from('conversation_members')
    .update({ pinned_conv: convMeta[convId].pinnedConv })
    .eq('conversation_id', convId).eq('user_id', myProfile.id)
    .then(() => {}).catch(() => {})
  renderConversations()
  toast(convMeta[convId].pinnedConv ? '📌 Pinned to top' : '📌 Unpinned', 'info')
}

async function toggleMuteConv(convId) {
  if (!convMeta[convId]) convMeta[convId] = {}
  convMeta[convId].muted = !convMeta[convId].muted
  await window._db.from('conversation_members')
    .update({ muted: convMeta[convId].muted })
    .eq('conversation_id', convId).eq('user_id', myProfile.id)
  renderConversations()
  toast(convMeta[convId].muted ? '🔕 Conversation muted' : '🔔 Unmuted', 'info')
}

async function archiveConv(convId) {
  if (!convMeta[convId]) convMeta[convId] = {}
  convMeta[convId].archived = true
  await window._db.from('conversation_members')
    .update({ archived: true })
    .eq('conversation_id', convId).eq('user_id', myProfile.id)
  if (state.activeConvId === convId) closeChatMobile()
  state.activeConvId = null
  renderConversations()
  toast('🗂 Conversation archived', 'info')
}

async function pinMessage(convId, msgId) {
  if (!convMeta[convId]) convMeta[convId] = {}
  convMeta[convId].pinnedMsgId = msgId
  await window._db.from('conversation_members')
    .update({ pinned_msg_id: msgId })
    .eq('conversation_id', convId).eq('user_id', myProfile.id)
  renderPinnedBar(convId)
  renderMessages(convId)
  toast('Message pinned 📌', 'success')
}

async function unpinMessage(convId) {
  if (!convMeta[convId]) return
  convMeta[convId].pinnedMsgId = null
  await window._db.from('conversation_members')
    .update({ pinned_msg_id: null })
    .eq('conversation_id', convId).eq('user_id', myProfile.id)
  renderPinnedBar(convId)
  renderMessages(convId)
  toast('Message unpinned', 'info')
}

async function markAsRead(convId) {
  const conv = CONVERSATIONS.find(c => c.id === convId)
  if (conv) conv.unread = 0

  await window._db.from('conversation_members')
    .update({ last_read_at: new Date().toISOString() })
    .eq('conversation_id', convId).eq('user_id', myProfile.id)

  // Insert message_reads rows for all unread messages (mark as read for senders)
  if (conv && conv.messages.length > 0) {
    const unreadMsgIds = conv.messages
      .filter(m => m.sender !== 'me')
      .map(m => m.id)
      .filter(Boolean)
    if (unreadMsgIds.length > 0) {
      // Upsert in batches of 50 to avoid hitting request limits
      const batch = unreadMsgIds.slice(-50).map(id => ({
        message_id: id,
        user_id: myProfile.id,
        conversation_id: convId,
      }))
      window._db.from('message_reads')
        .upsert(batch, { onConflict: 'message_id,user_id', ignoreDuplicates: true })
        .then(() => {}).catch(() => {})
    }
  }

  renderConversations()
  updateNotifBadge()
}

// When a realtime message_read INSERT comes in, update the local message deliveryStatus
function handleMessageRead(payload) {
  const { message_id, user_id } = payload.new || {}
  if (!message_id || user_id === myProfile.id) return
  // Find and update the message across all conversations
  for (const conv of CONVERSATIONS) {
    const msg = conv.messages.find(m => m.id === message_id)
    if (msg && msg.sender === 'me') {
      msg.readBy = true
      msg.deliveryStatus = 'read'
      if (state.activeConvId === conv.id) renderMessages(conv.id)
      break
    }
  }
}

async function doSignIn() {
  clearLoginError()
  const email = document.getElementById('li-email').value.trim()
  const pass  = document.getElementById('li-pass').value
  if (!email) { shakeInput('li-email'); showLoginError('Please enter your email.'); return }
  if (!pass)  { shakeInput('li-pass');  showLoginError('Please enter your password.'); return }

  setLoginLoading('signin', true)
  const { data, error } = await window._db.auth.signInWithPassword({ email, password: pass })
  setLoginLoading('signin', false)

  if (error) { shakeInput('li-email'); shakeInput('li-pass'); showLoginError(error.message); return }
  currentUser = data.user
  await bootApp()
}

async function doSignUp() {
  clearLoginError()
  const name  = document.getElementById('su-name').value.trim()
  const email = document.getElementById('su-email').value.trim()
  const pass  = document.getElementById('su-pass').value
  const pass2 = document.getElementById('su-pass2').value
  if (!name)                      { shakeInput('su-name');  showLoginError('Please enter your full name.'); return }
  if (!email || !email.includes('@')) { shakeInput('su-email'); showLoginError('Please enter a valid email.'); return }
  if (pass.length < 6)            { shakeInput('su-pass');  showLoginError('Password must be at least 6 characters.'); return }
  if (pass !== pass2)             { shakeInput('su-pass2'); showLoginError('Passwords do not match.'); return }

  setLoginLoading('signup', true)
  const { data, error } = await window._db.auth.signUp({
    email, password: pass,
    options: { data: { display_name: name } }
  })
  setLoginLoading('signup', false)

  if (error) { showLoginError(error.message); return }

  if (data.user && !data.session) {
    const ok = document.getElementById('login-success')
    if (ok) { ok.textContent = '✅ Check your email to confirm your account, then sign in.'; ok.style.display = 'block' }
    switchLoginTab('signin')
    return
  }
  currentUser = data.user
  await bootApp()
}

async function doPasswordReset() {
  const email = document.getElementById('reset-email')?.value.trim()
  if (!email) { shakeInput('reset-email'); showLoginError('Please enter your email.'); return }
  const btn = document.getElementById('reset-btn')
  if (btn) btn.disabled = true
  const { error } = await window._db.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + window.location.pathname
  })
  if (btn) btn.disabled = false
  if (error) { showLoginError(error.message); return }
  const ok = document.getElementById('login-success')
  if (ok) { ok.textContent = '✅ Reset link sent! Check your inbox.'; ok.style.display = 'block' }
}

async function doSignOut() {
  await setOnlineStatus(false).catch(()=>{})
  closeAllModals(); closeMoreDrawer()
  if (msgSubscription)  window._db.removeChannel(msgSubscription)
  if (convSubscription) window._db.removeChannel(convSubscription)
  await window._db.auth.signOut()
  currentUser = null
  CONVERSATIONS = []; USERS = {}; NOTIFICATIONS = []; STORIES = []
  const app = document.getElementById('app')
  app.style.opacity = '0'; app.style.transition = 'opacity .35s ease'
  setTimeout(() => {
    app.style.display = 'none'; app.style.opacity = ''; app.style.transition = ''
    state.activeConvId = null
    showLoginScreen()
    toast('You have been signed out 👋', 'info')
  }, 370)
}

  ls.style.opacity='0'; ls.style.transform='scale(1.03)'; ls.style.transition='opacity .45s ease,transform .45s ease'

function showLoginError(msg) { const el=document.getElementById('login-error'); if(el){el.textContent=msg;el.style.display='block'} }
function clearLoginError() {
  const e=document.getElementById('login-error'); if(e){e.style.display='none';e.textContent=''}
  const s=document.getElementById('login-success'); if(s){s.style.display='none';s.textContent=''}

function setLoginLoading(form,loading) {
  const btn=document.getElementById(form+'-btn'),lbl=document.getElementById(form+'-label'),spin=document.getElementById(form+'-spinner')

  btn.disabled=loading; lbl.style.display=loading?'none':'inline'; spin.style.display=loading?'block':'none'

function togglePassVis(inputId,btn) {

function shakeInput(id) {
  const el=document.getElementById(id); if(!el) return

// APP LAUNCH
// ══════════════════════════════════════════════════════════════════
function launchApp() {
  hideLoginScreen()
  const splash = document.getElementById('splash')
  splash.style.display='flex'; splash.style.opacity='0'; splash.style.transition='opacity .4s ease'
  splash.classList.remove('hide')
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ splash.style.opacity='1' }))
  setTimeout(()=>{
    splash.classList.add('hide')
    setTimeout(()=>{
      splash.style.display='none'; splash.style.opacity=''; splash.style.transition=''
      document.getElementById('app').style.display='flex'
      updateSidebarProfile()
      renderConversations()
      // Handle notification tap: ?open_conv=<id> or pendingOpenConv from SW message
      if (window._pendingOpenConv) {
        const convId = window._pendingOpenConv
        delete window._pendingOpenConv
        setTimeout(() => {
          const conv = CONVERSATIONS.find(c => c.id === convId)
          if (conv) openConversation(convId)
        }, 400)
      }
      loadStatuses()
      updateNotifBadge()
      applyDensity(state.density)
      if (state.sidebarWallpaper && state.sidebarWallpaper !== 'none') {
        setTimeout(() => applySidebarWallpaper(state.sidebarWallpaper), 100)
      }
      initLongPress()
      if (state.isMobile) mobileTab('chats')
      else if (CONVERSATIONS.length > 0) openConversation(CONVERSATIONS[0].id)
    }, 580)
  }, 1600)
}

function hideSplashAndLaunch() {
  document.getElementById('splash').classList.add('hide')
  setTimeout(()=>{ document.getElementById('splash').style.display='none'; launchApp() }, 580)
}

// ══════════════════════════════════════════════════════════════════
// RENDER: CONVERSATIONS LIST
// ══════════════════════════════════════════════════════════════════
function renderConversations(filter='') {
  const list = document.getElementById('conversations-list')
  const tab  = state.tab
  let convs  = CONVERSATIONS.filter(c => {
    const name = c.name.toLowerCase()
    const q    = filter.toLowerCase()
    if (convMeta[c.id]?.archived) return false
    if (tab==='dms')    return c.type==='dm'    && name.includes(q)
    if (tab==='groups') return c.type==='group' && name.includes(q)
    return name.includes(q)
  })

  if (convs.length === 0) {
    list.innerHTML = filter
      ? `<div style="text-align:center;padding:40px 20px">
          <div style="font-size:36px;margin-bottom:12px;opacity:.4">🔍</div>
          <div style="color:var(--text-muted);font-size:13.5px;font-weight:500">No results for "<strong style='color:var(--text-secondary)'>${escapeHtml(filter)}</strong>"</div>
        </div>`
      : `<div style="text-align:center;padding:48px 20px 32px">
          <div style="width:64px;height:64px;margin:0 auto 16px;background:var(--accent-glow);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;border:1.5px solid var(--border-accent)">💬</div>
          <div style="color:var(--text-secondary);font-size:14px;font-weight:600;margin-bottom:6px">No chats yet</div>
          <div style="color:var(--text-muted);font-size:12.5px">Tap the pencil icon to start a conversation</div>
        </div>`
    return
  }

  // Sort: pinned first (preserve insertion order within each group)
  const pinned   = convs.filter(c => convMeta[c.id]?.pinnedConv)
  const unpinned = convs.filter(c => !convMeta[c.id]?.pinnedConv)

  const renderItem = c => {
    const active   = c.id === state.activeConvId
    const user     = c.type==='dm' ? USERS[c.otherId] : null
    const initials = user ? user.initials : (c.name[1]||c.name[0]||'G')
    const isMuted  = convMeta[c.id]?.muted
    const isPinned = convMeta[c.id]?.pinnedConv
    const hasDraft = drafts[c.id] && c.id !== state.activeConvId
    // Show typing if the typing indicator is active for this conversation
    // (the app tracks typing per active conv via typingChannel broadcast)
    const isTyping = _typingConvId === c.id && c.id !== state.activeConvId

    // Avatar
    const avatarBg = c.type==='group'
      ? 'background:linear-gradient(135deg,var(--accent-dim),var(--accent-bright));color:#fff'
      : ''
    const avatarContent = user?.avatar_url
      ? `<img src="${user.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`
      : initials

    // Preview line: typing > draft > last message
    let previewHtml = ''
    if (isTyping) {
      const typerName = _typingConvUser && c.type==='group' && USERS[_typingConvUser] ? USERS[_typingConvUser].display_name?.split(' ')[0] || '' : ''
      previewHtml = `<span class="conv-typing-indicator"><span class="typing-dots"><span></span><span></span><span></span></span>${c.type==='group'&&typerName ? `<span style="color:var(--accent);font-weight:600">${typerName}</span> ` : ''}typing…</span>`
    } else if (hasDraft) {
      previewHtml = `<span class="conv-draft-badge">Draft:</span> <span class="conv-draft-preview">${escapeHtml(drafts[c.id].slice(0,40))}${drafts[c.id].length>40?'…':''}</span>`
    } else {
      // Add sender prefix for groups
      let prefix = ''
      if (c.type==='group' && c.lastSenderId) {
        if (c.lastSenderId === myProfile?.id) {
          prefix = '<span class="conv-sender-prefix">You: </span>'
        } else if (USERS[c.lastSenderId]) {
          const fn = USERS[c.lastSenderId].display_name?.split(' ')[0] || USERS[c.lastSenderId].username || ''
          if (fn) prefix = `<span class="conv-sender-prefix">${fn}: </span>`
        }
      }
      previewHtml = prefix + (c.preview || '')
    }

    // Unread badge or muted badge
    let badgeHtml = ''
    if (c.unread > 0) {
      badgeHtml = isMuted
        ? `<div class="unread-badge unread-badge-muted">${c.unread > 99 ? '99+' : c.unread}</div>`
        : `<div class="unread-badge">${c.unread > 99 ? '99+' : c.unread}</div>`
    }

    // Pinned pin icon (right-aligned, subtle)
    const pinnedIcon = isPinned && c.unread === 0 ? `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--text-muted);opacity:.5"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 00-1.11-1.79l-1.78-.9A2 2 0 0115 10.76V6h1a2 2 0 000-4H8a2 2 0 000 4h1v4.76a2 2 0 01-1.11 1.79l-1.78.9A2 2 0 005 15.24V17z"/></svg>` : ''

    // Mute icon
    const muteIcon = isMuted ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text-muted);opacity:.6;flex-shrink:0"><path d="M16.5 12A4.5 4.5 0 0014 7.97V9.9l2.45 2.45c.03-.11.05-.24.05-.35zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0021 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0017.73 18l2 2L21 18.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>` : ''

    // Last message status tick (for own messages)
    const ownLastMsg = c.lastSenderId === myProfile?.id
    const tickHtml = ownLastMsg && !isTyping && !hasDraft
      ? `<span class="conv-tick tick ${c.lastMsgRead?'read':c.lastMsgDelivered?'delivered':'sent'}">✓${c.lastMsgDelivered||c.lastMsgRead?'✓':''}</span>`
      : ''

    return `<div class="conv-item ${active?'active':''} ${isPinned?'pinned-conv':''} ${c.unread>0&&!isMuted?'has-unread':''}" onclick="openConversation('${c.id}')" oncontextmenu="showConvMenu(event,'${c.id}')">
      <div class="av-wrap">
        <div class="av" style="${avatarBg}">${avatarContent}</div>
        ${user ? `<div class="status-dot ${user.status||'offline'}"></div>` : ''}
      </div>
      <div class="conv-info">
        <div class="conv-name-row">
          <span class="conv-name">${c.name}</span>
          ${c.type==='group' ? `<span class="conv-group-badge">👥 ${c.members.length}</span>` : ''}
          ${isMuted ? `<svg class="mute-icon" width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12A4.5 4.5 0 0014 7.97V9.9l2.45 2.45c.03-.11.05-.24.05-.35zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0021 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0017.73 18l2 2L21 18.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>` : ''}
        </div>
        <div class="conv-preview">${previewHtml}</div>
      </div>
      <div class="conv-meta">
        <div class="conv-time-row">
          <span class="conv-time">${c.time||''}</span>
          ${isPinned && c.unread===0 ? `<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text-muted);opacity:.4"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>` : ''}
        </div>
        ${c.unread > 0
          ? `<div class="unread-badge ${isMuted?'unread-badge-muted':''}">${c.unread > 99 ? '99+' : c.unread}</div>`
          : tickHtml
        }
      </div>
    </div>`
  }

  let html = ''
  if (pinned.length > 0) {
    html += `<div class="conv-section-label"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg> Pinned</div>`
    html += pinned.map(renderItem).join('')
    if (unpinned.length > 0) html += `<div class="conv-section-label" style="margin-top:6px">Recent</div>`
  }
  html += unpinned.map(renderItem).join('')
  list.innerHTML = html

  // Stagger-animate items on render
  requestAnimationFrame(() => {
    list.querySelectorAll('.conv-item').forEach((el, i) => {
      el.style.animation = 'none'
      el.style.opacity = '0'
      el.style.transform = 'translateX(-8px)'
      requestAnimationFrame(() => {
        el.style.transition = `opacity .22s ease ${i * 28}ms, transform .28s var(--t-spring) ${i * 28}ms`
        el.style.opacity = '1'
        el.style.transform = ''
      })
    })
  })
}

  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'))
  document.getElementById('tab-'+tab)?.classList.add('active')

// ══════════════════════════════════════════════════════════════════
// OPEN CONVERSATION
// ══════════════════════════════════════════════════════════════════
async function openConversation(id) {
  // Save draft of currently open conversation before switching
  if (state.activeConvId && state.activeConvId !== id) {
    const prevInput = document.getElementById('msg-input-' + state.activeConvId)
    if (prevInput && !editMode[state.activeConvId]) {
      const val = prevInput.value
      if (val.trim()) drafts[state.activeConvId] = val
      else delete drafts[state.activeConvId]
    }
  }

  state.activeConvId = id
  const conv = CONVERSATIONS.find(c => c.id === id)
  if (!conv) return

  // Load messages from DB if not yet loaded
  if (conv.messages.length === 0) {
    await loadMessages(id)
  }

  // Mark as read
  conv.unread = 0
  markAsRead(id)
  renderConversations()
  updateNotifBadge()

  const chatArea = document.getElementById('chat-area')
  const user     = conv.type==='dm' ? USERS[conv.otherId] : null
  const name     = conv.name
  const memberAvatars = conv.type==='group'
    ? (conv.members||[]).slice(0,3).map(uid=>{
        const u = uid===myProfile.id ? ME : USERS[uid]
        return u ? `<span style="width:14px;height:14px;border-radius:50%;background:var(--accent-dim);display:inline-flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff;border:1.5px solid var(--bg-deep);margin-left:-3px">${(u.initials||'?')[0]}</span>` : ''
      }).join('') : ''
  const dmStatusText = user
    ? (user.status === 'online' ? 'online' : formatLastSeen(user.last_seen))
    : 'offline'
  const sub = conv.type==='dm'
    ? dmStatusText

// RENDER: MESSAGES
// ══════════════════════════════════════════════════════════════════
function renderMessages(id) {
  const conv = CONVERSATIONS.find(c => c.id === id)
  if (!conv) return
  const container = document.getElementById('messages-container-'+id)
  if (!container) return

  let lastDate=null, lastSender=null, html=''

  conv.messages.forEach((msg, msgIndex) => {
    const isOwn   = msg.sender === 'me'
    const sender  = isOwn ? (msg.isAnon?{initials:'?',name:'Anonymous'}:ME) : USERS[msg.sender]
    const showDate = msg.date !== lastDate
    if (showDate) { html+=`<div class="date-divider"><span>${msg.date}</span></div>`; lastDate=msg.date; lastSender=null }
    const showAvatar = lastSender !== msg.sender
    lastSender = msg.sender

    let bubbleContent=''
    if (msg.isPoll && msg.poll) {
      const total = msg.poll.totalVotes || 1
      bubbleContent=`<div class="poll-card">
        <div class="poll-question">📊 ${msg.poll.question}</div>
        ${msg.poll.options.map((opt,i)=>`
          <div class="poll-opt ${msg.poll.userVote===i?'voted':''}" onclick="votePoll('${id}','${msg.id}',${i})">
            <div class="poll-bar" style="width:${Math.round(opt.votes/total*100)}%"></div>
            <div class="poll-opt-inner"><span>${opt.text}</span><span class="poll-pct">${Math.round(opt.votes/total*100)}%</span></div>
          </div>`).join('')}
        <div style="font-size:11px;color:var(--text-muted);margin-top:6px">${msg.poll.totalVotes} votes</div>
      </div>`
    } else if (msg.isFile) {
      const isImg = msg.fileMime && msg.fileMime.startsWith('image/')
      if (isImg && msg.fileUrl) {
        bubbleContent=`<div class="img-bubble" onclick="openImageViewer('${msg.fileUrl}','${(msg.fileName||'').replace(/'/g,'')}')">
          <img src="${msg.fileUrl}" alt="${msg.fileName||'Image'}" style="max-width:220px;max-height:200px;border-radius:10px;display:block;cursor:zoom-in;object-fit:cover" loading="lazy" onerror="this.parentElement.innerHTML='🖼 Image (unavailable)'"/>
        </div>`
      } else {
        bubbleContent=`<a href="${msg.fileUrl||'#'}" target="_blank" rel="noopener" download="${msg.fileName||'file'}" style="text-decoration:none;color:inherit">
          <div class="file-bubble">
            <span style="font-size:28px">${msg.fileType||'📄'}</span>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${msg.fileName||'File'}</div>
              <div style="font-size:11px;opacity:.6;margin-top:2px">${msg.fileSize} · Tap to download</div>
            </div>
            <span style="font-size:16px;opacity:.5">↓</span>
          </div>
        </a>`
      }
    } else if (msg.isContact) {
      const cu = USERS[msg.contactId] || { name: msg.text, initials: (msg.text||'?')[0].toUpperCase(), username: '', avatar_url: null }
      bubbleContent = `<div class="contact-card-bubble" onclick="showUserProfile('${msg.contactId}')">
        <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent-dim),var(--accent));display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden">
          ${cu.avatar_url ? `<img src="${cu.avatar_url}" style="width:100%;height:100%;object-fit:cover"/>` : (cu.initials||'?')}
        </div>
        <div class="contact-card-info">
          <div class="contact-card-name">${cu.name || msg.text || 'Unknown'}</div>
          <div class="contact-card-username">@${cu.username || ''}</div>
          <div class="contact-card-action">👆 Tap to view profile</div>
        </div>
        <span style="font-size:20px;opacity:.4">›</span>
      </div>`
    } else if (msg.isCode) {
      bubbleContent=`<pre style="background:var(--bg-void);border:1px solid var(--border-default);border-radius:8px;padding:8px 10px;font-family:var(--font-mono,'monospace');font-size:12px;color:#a8ff78;overflow-x:auto;margin:2px 0;white-space:pre">${msg.text.replace(/```\n?/g,'')}</pre>`
    } else {
      bubbleContent=renderMentions(escapeHtml(msg.text))
    }

    const reactionsHtml = msg.reactions?.length ? `<div class="reactions-bar">
      ${msg.reactions.map(r=>`<div class="reaction-chip ${r.mine?'own':''}" onclick="toggleReaction('${id}','${msg.id}','${r.emoji}')">${r.emoji}<span>${r.count}</span></div>`).join('')}
    </div>` : ''

    html+=`
      <div class="message-row ${isOwn?'own':''}" id="msg-${msg.id}" data-msg-id="${msg.id}" data-conv-id="${id}">
        <div class="swipe-reply-icon" id="swipe-icon-${msg.id}">↩</div>
        <div class="msg-av" style="width:30px">
          ${!isOwn&&showAvatar?`<div class="av av-sm" style="overflow:hidden">${sender?.avatar_url?`<img src="${sender.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`:(sender?.initials||'?')}</div>`:''}
        </div>
        <div class="message-bubble-wrap">
          ${!isOwn&&showAvatar&&conv.type==='group'?`<div class="sender-name-row">${sender?.name||'Unknown'}</div>`:''}
          ${msg.replyTo?`<div style="background:var(--bg-raised);border-left:3px solid var(--mood,var(--accent));border-radius:var(--radius-sm);padding:5px 8px;margin-bottom:4px;font-size:11.5px;color:var(--text-muted);cursor:pointer"><strong style="color:var(--accent)">${msg.replyTo.senderName||'Message'}</strong><br/>${msg.replyTo.text?.slice(0,60)||''}</div>`:''}
          <div class="message-bubble ${convMeta[id]?.pinnedMsgId===msg.id?'pinned-msg':''}" style="animation-delay:${Math.min(msgIndex*.02,.3)}s" oncontextmenu="showMsgMenu(event,'${id}','${msg.id}','${isOwn}')">
            ${bubbleContent}
          </div>
          ${reactionsHtml}
          <div class="msg-time">
            ${msg.isEdited?`<span class="edited-tag" title="Edited${msg.editedAt?' at '+msg.editedAt:''}">✏ edited</span>`:''}
            ${msg.time}
            ${isOwn&&myProfile.read_receipts?`<span class="tick ${msg.deliveryStatus||'delivered'}">${msg.deliveryStatus==='sent'?'✓':'✓✓'}</span>`:''}
            ${msg.isDestruct?`<span class="destruct-badge">🔥</span>`:''}
            ${starredMessages.find(s=>s.msgId===msg.id)?`<span style="font-size:10px">⭐</span>`:''}
          </div>
        </div>
      </div>`
  })

  container.innerHTML = html
  container.scrollTop = container.scrollHeight

  // Trigger link previews for visible text messages
  conv.messages.forEach(msg => {
    if (!msg.isFile && !msg.isPoll && msg.text) {
      const url = extractUrl(msg.text)
      if (url) renderLinkPreview(id, msg.id, url)
    }
  })
}

// ══════════════════════════════════════════════════════════════════
// NOTIFICATION BADGE
// ══════════════════════════════════════════════════════════════════
function updateNotifBadge() {
  // Count total unread messages across all non-muted conversations
  const totalUnread = CONVERSATIONS.reduce((sum, c) => {
    if (convMeta[c.id]?.muted) return sum
    return sum + (c.unread || 0)
  }, 0)

  // Bell badge
  const badge = document.getElementById('notif-badge')
  if (badge) {
    badge.textContent = totalUnread > 99 ? '99+' : totalUnread
    badge.style.display = totalUnread > 0 ? 'flex' : 'none'
  }

  // Document title tab badge
  const base = 'Leafy'
  document.title = totalUnread > 0 ? `(${totalUnread}) ${base}` : base

  // Drawer notification subtitle
  const drawerSub = document.getElementById('notif-drawer-sub')
  const drawerBadge = document.getElementById('notif-drawer-badge')
  if (drawerSub) drawerSub.textContent = totalUnread > 0 ? `${totalUnread} unread message${totalUnread>1?'s':''}` : 'All caught up'
  if (drawerBadge) {
    drawerBadge.textContent = totalUnread > 99 ? '99+' : totalUnread
    drawerBadge.style.display = totalUnread > 0 ? 'inline-flex' : 'none'
  }
}

// ══════════════════════════════════════════════════════════════════
// MESSAGING HELPERS (non-async UI bits)
// ══════════════════════════════════════════════════════════════════
function toggleAnon(id) {
  anonMode[id]=!anonMode[id]
  const btn=document.getElementById('anon-btn-'+id)
  if(btn){btn.classList.toggle('on',anonMode[id]);btn.textContent=anonMode[id]?'🙈 Anon ON':'👁 Anon'}
  toast(anonMode[id]?'Anonymous mode ON':'Anonymous mode OFF','info')
}
function handleKey(e,id){
  // Navigate @mention popup
  const popup = document.getElementById('mention-popup-'+id)
  if (popup && popup.style.display !== 'none') {
    const items = popup.querySelectorAll('.mention-item')
    const active = popup.querySelector('.mention-item.active')
    let idx = Array.from(items).indexOf(active)
    if (e.key === 'ArrowDown') { e.preventDefault(); items[Math.min(idx+1, items.length-1)]?.classList.add('active'); if (active) active.classList.remove('active'); return }
    if (e.key === 'ArrowUp')   { e.preventDefault(); items[Math.max(idx-1, 0)]?.classList.add('active'); if (active) active.classList.remove('active'); return }
    if (e.key === 'Enter' || e.key === 'Tab') {
      const sel = popup.querySelector('.mention-item.active') || items[0]
      if (sel) { e.preventDefault(); sel.click(); return }
    }
    if (e.key === 'Escape') { closeMentionPopup(id); return }
  }
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg(id)}
  if(e.key==='Escape'){cancelReply(id);cancelEdit(id)}
}
function handleInput(e,id){
  const ta=e.target
  ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,120)+'px'

  // Save draft (only when not in edit mode)
  if (!editMode[id]) drafts[id] = ta.value

  // @mention detection
  const val = ta.value
  const cursor = ta.selectionStart
  const before = val.slice(0, cursor)
  const mentionMatch = before.match(/@(\w*)$/)
  if (mentionMatch) {
    showMentionPopup(id, mentionMatch[1])
  } else {
    closeMentionPopup(id)
  }

  // Broadcast typing event
  if (typingChannel) {
    typingChannel.send({ type:'broadcast', event:'typing', payload:{ convId:id, userId:myProfile.id, isTyping:true } })
    clearTimeout(typingBroadcastTimeout)
    typingBroadcastTimeout = setTimeout(() => {
      if (typingChannel) typingChannel.send({ type:'broadcast', event:'typing', payload:{ convId:id, userId:myProfile.id, isTyping:false } })
    }, 2500)
  }
}
function setReplyTo(id,msgId,senderName,text){
  replyTo[id]={msgId,senderName,text}
  const strip=document.getElementById('reply-strip-'+id),txt=document.getElementById('reply-strip-text-'+id)
  if(strip&&txt){strip.style.display='flex';txt.innerHTML=`<strong>↩ ${senderName}:</strong> ${text.slice(0,60)}${text.length>60?'...':''}`}
  document.getElementById('msg-input-'+id)?.focus()
}
function cancelReply(id){replyTo[id]=null;const strip=document.getElementById('reply-strip-'+id);if(strip)strip.style.display='none'}

// ══════════════════════════════════════════════════════════════════
// EDIT MESSAGES
// ══════════════════════════════════════════════════════════════════
function startEditMsg(convId, msgId) {
  const conv = CONVERSATIONS.find(c => c.id === convId)
  const msg  = conv?.messages.find(m => m.id === msgId)
  if (!msg || msg.sender !== 'me') return

  editMode[convId] = msgId
  const input = document.getElementById('msg-input-' + convId)
  const strip  = document.getElementById('edit-strip-' + convId)
  const preview = document.getElementById('edit-strip-preview-' + convId)

  if (input) {
    input.value = msg.text
    input.style.height = 'auto'
    input.style.height = Math.min(input.scrollHeight, 120) + 'px'
    input.focus()
    // Move cursor to end
    input.setSelectionRange(input.value.length, input.value.length)
  }
  if (strip)   strip.style.display = 'flex'
  if (preview) preview.textContent  = msg.text.slice(0, 50) + (msg.text.length > 50 ? '…' : '')

  // Change send button to checkmark
  const btn = document.getElementById('send-btn-' + convId)
  if (btn) { btn.textContent = '✓'; btn.style.background = '#eab308' }
}

function cancelEdit(convId) {
  if (!editMode[convId]) return
  delete editMode[convId]
  const input = document.getElementById('msg-input-' + convId)
  const strip  = document.getElementById('edit-strip-' + convId)
  if (input) { input.value = drafts[convId] || ''; input.style.height = 'auto' }
  if (strip) strip.style.display = 'none'
  const btn = document.getElementById('send-btn-' + convId)
  if (btn) { btn.textContent = '➤'; btn.style.background = '' }
}

async function submitEdit(convId) {
  const msgId = editMode[convId]
  const input  = document.getElementById('msg-input-' + convId)
  if (!msgId || !input) return
  const newText = input.value.trim()
  if (!newText) return

  const { error } = await window._db.from('messages')
    .update({ text: newText, is_edited: true, edited_at: new Date().toISOString() })
    .eq('id', msgId).eq('sender_id', myProfile.id)

  if (error) { toast('Could not edit message', 'error'); return }

  // Update locally
  const conv = CONVERSATIONS.find(c => c.id === convId)
  const msg  = conv?.messages.find(m => m.id === msgId)
  if (msg) {
    msg.text = newText
    msg.isEdited = true
    msg.editedAt = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
  }

  cancelEdit(convId)
  renderMessages(convId)
  toast('Message edited', 'success')
}

// ══════════════════════════════════════════════════════════════════
function showMentionPopup(convId, query) {
  const popup = document.getElementById('mention-popup-' + convId)
  if (!popup) return

  const conv = CONVERSATIONS.find(c => c.id === convId)
  // For DMs show only the other person; for groups show all members except self
  let candidates = []
  if (conv?.type === 'group') {
    candidates = (conv.members || [])
      .filter(uid => uid !== myProfile.id)
      .map(uid => USERS[uid])
      .filter(Boolean)
  } else if (conv?.type === 'dm' && conv.otherId) {
    const u = USERS[conv.otherId]
    if (u) candidates = [u]
  }

  const q = query.toLowerCase()
  const filtered = candidates.filter(u =>
    u.name.toLowerCase().includes(q) || (u.username||'').toLowerCase().includes(q)
  )

  if (filtered.length === 0) { closeMentionPopup(convId); return }

  popup.style.display = 'block'
  popup.innerHTML = filtered.map((u, i) => `
    <div class="mention-item${i===0?' active':''}" onclick="insertMention('${convId}','${u.username||u.name}','${u.id}')">
      <div class="av" style="width:28px;height:28px;font-size:11px;overflow:hidden;flex-shrink:0">
        ${u.avatar_url ? `<img src="${u.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>` : u.initials}
      </div>
      <div>
        <div class="mention-item-name">${u.name}</div>
        <div class="mention-item-username">@${u.username||''}</div>
      </div>
    </div>`).join('')
  mentionPopupConv = convId
}

function closeMentionPopup(convId) {
  const popup = document.getElementById('mention-popup-' + (convId || mentionPopupConv))
  if (popup) popup.style.display = 'none'
  mentionPopupConv = null
}

function insertMention(convId, username, userId) {
  const input = document.getElementById('msg-input-' + convId)
  if (!input) return
  const val    = input.value
  const cursor = input.selectionStart
  const before = val.slice(0, cursor)
  const after  = val.slice(cursor)
  // Replace the @partial with @username
  const replaced = before.replace(/@\w*$/, '@' + username + ' ')
  input.value = replaced + after
  input.focus()
  const newCursor = replaced.length
  input.setSelectionRange(newCursor, newCursor)
  closeMentionPopup(convId)
  // Update draft
  drafts[convId] = input.value
}

function renderMentions(escapedText) {
  // Highlight @username patterns in rendered message text
  return escapedText.replace(/@(\w+)/g, (match, uname) => {
    const user = Object.values(USERS).find(u => u.username === uname)
    const isMe = uname === myProfile?.username
    if (user || isMe) {
      return `<span class="mention-tag${isMe?' own-mention':''}" style="${isMe?'background:rgba(234,179,8,.18);color:#eab308':''}">@${uname}</span>`
    }
    return match
  })
}

function renderGalleryTab(tab, rows, linkMsgs) {
  const body = document.getElementById('gallery-body')
  if (!body) return

  const images = rows.filter(r => r.file_mime?.startsWith('image'))
  const videos = rows.filter(r => r.file_mime?.startsWith('video'))
  const files  = rows.filter(r => !r.file_mime?.startsWith('image') && !r.file_mime?.startsWith('video'))

  if (tab === 'media') {
    if (images.length === 0) { body.innerHTML = `<div class="gallery-empty">📷<br/><br/>No photos shared yet</div>`; return }
    // Group by month
    const groups = {}
    images.forEach(r => {
      const d = new Date(r.created_at)
      const key = d.toLocaleDateString([], { month: 'long', year: 'numeric' })
      if (!groups[key]) groups[key] = []
      groups[key].push(r)
    })
    const allImages = images // flat list for lightbox navigation
    body.innerHTML = Object.entries(groups).map(([month, imgs]) => `
      <div class="gallery-date-group">${month} · ${imgs.length} photo${imgs.length!==1?'s':''}</div>
      <div class="gallery-grid">
        ${imgs.map(r => {
          const globalIdx = allImages.indexOf(r)
          const date = new Date(r.created_at).toLocaleDateString([],{month:'short',day:'numeric'})
          return `<div class="gallery-cell" onclick="openGalleryLightbox(${globalIdx},${JSON.stringify(allImages.map(x=>({url:x.file_url,name:x.file_name||'photo',date:x.created_at,sender:x.sender_id})))})">
            <img src="${r.file_url}" loading="lazy" alt="${escapeHtml(r.file_name||'photo')}"/>
            <div class="gallery-cell-overlay"></div>
            <div class="gallery-cell-date">${date}</div>
          </div>`
        }).join('')}
      </div>`).join('')

  } else if (tab === 'video') {
    if (videos.length === 0) { body.innerHTML = `<div class="gallery-empty">🎬<br/><br/>No videos shared yet</div>`; return }
    body.innerHTML = `<div class="gallery-grid">
      ${videos.map(r => `
        <div class="gallery-cell" onclick="window.open('${r.file_url}','_blank')">
          <video src="${r.file_url}" style="width:100%;height:100%;object-fit:cover" preload="metadata" muted></video>
          <div class="gallery-cell-play">▶</div>
          <div class="gallery-cell-date">${new Date(r.created_at).toLocaleDateString([],{month:'short',day:'numeric'})}</div>
        </div>`).join('')}
    </div>`

  } else if (tab === 'files') {
    if (files.length === 0) { body.innerHTML = `<div class="gallery-empty">📎<br/><br/>No files shared yet</div>`; return }
    body.innerHTML = `<div style="padding:12px;display:flex;flex-direction:column;gap:8px">
      ${files.map(r => {
        const size = r.file_size ? (r.file_size > 1048576 ? (r.file_size/1048576).toFixed(1)+' MB' : (r.file_size/1024).toFixed(0)+' KB') : ''
        const icon = r.file_mime?.includes('pdf') ? '📄' : r.file_mime?.includes('audio') ? '🎵' : r.file_mime?.includes('video') ? '🎬' : r.file_mime?.includes('zip') ? '🗜' : r.file_mime?.includes('word') ? '📝' : r.file_mime?.includes('sheet') ? '📊' : '📎'
        const sender = USERS[r.sender_id]?.name || 'You'
        const date = new Date(r.created_at).toLocaleDateString([], {month:'short', day:'numeric', year:'numeric'})
        return `<a href="${r.file_url}" target="_blank" class="gallery-file-item" style="text-decoration:none;color:inherit">
          <span style="font-size:28px">${icon}</span>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(r.file_name||'File')}</div>
            <div style="font-size:11px;color:var(--text-muted)">${size}${size?' · ':''}${sender} · ${date}</div>
          </div>
          <span style="font-size:18px;opacity:.5">↓</span>
        </a>`
      }).join('')}
    </div>`

  } else if (tab === 'links') {
    if (!linkMsgs || linkMsgs.length === 0) { body.innerHTML = `<div class="gallery-empty">🔗<br/><br/>No links shared yet</div>`; return }
    body.innerHTML = linkMsgs.map(msg => {
      const url = extractUrl(msg.text) || ''
      let domain = ''
      try { domain = new URL(url).hostname.replace('www.','') } catch(e) {}
      const sender = msg.sender === 'me' ? (myProfile.name || 'You') : (USERS[msg.senderId]?.name || 'Unknown')
      return `<a href="${url}" target="_blank" class="gallery-link-item">
        <div class="gallery-link-thumb">🔗</div>
        <div style="flex:1;min-width:0">
          <div class="gallery-link-domain">${escapeHtml(domain)}</div>
          <div class="gallery-link-title">${escapeHtml(url.slice(0,60))}</div>
          <div class="gallery-link-date">${sender} · ${msg.time||''}</div>
        </div>
        <span style="font-size:16px;opacity:.4">↗</span>
      </a>`
    }).join('')
  }
}

// Lightbox with prev/next navigation
let _lbImages = [], _lbIdx = 0
function openGalleryLightbox(idx, images) {
  _lbImages = images || []
  _lbIdx = idx || 0
  _renderLightbox()
}

function _renderLightbox() {
  document.querySelector('.gallery-lightbox')?.remove()
  const img = _lbImages[_lbIdx]
  if (!img) return

  const sender = USERS[img.sender]?.name || 'You'
  const date = new Date(img.date).toLocaleDateString([], {weekday:'short',month:'short',day:'numeric',year:'numeric'})

  const lb = document.createElement('div')
  lb.className = 'gallery-lightbox'
  lb.innerHTML = `
    ${_lbIdx > 0 ? `<button class="gallery-lightbox-nav prev" onclick="event.stopPropagation();_lbIdx--;_renderLightbox()">‹</button>` : ''}
    ${_lbIdx < _lbImages.length-1 ? `<button class="gallery-lightbox-nav next" onclick="event.stopPropagation();_lbIdx++;_renderLightbox()">›</button>` : ''}
    <div class="gallery-lightbox-counter">${_lbIdx+1} / ${_lbImages.length}</div>
    <img src="${img.url}" alt="${escapeHtml(img.name)}" onclick="event.stopPropagation()"/>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px" onclick="event.stopPropagation()">
      <div style="font-size:12px;color:rgba(255,255,255,.6)">${escapeHtml(img.name)} · ${sender} · ${date}</div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" onclick="document.querySelector('.gallery-lightbox')?.remove()">✕ Close</button>
        <a href="${img.url}" download="${escapeHtml(img.name)}" class="btn btn-primary" style="text-decoration:none">↓ Download</a>
      </div>
    </div>
  `
  lb.onclick = () => lb.remove()

  // Keyboard navigation
  lb._keyHandler = e => {
    if (e.key === 'ArrowLeft'  && _lbIdx > 0)              { _lbIdx--; _renderLightbox() }
    if (e.key === 'ArrowRight' && _lbIdx < _lbImages.length-1) { _lbIdx++; _renderLightbox() }
    if (e.key === 'Escape')                                  { lb.remove(); document.removeEventListener('keydown', lb._keyHandler) }
  }
  document.addEventListener('keydown', lb._keyHandler)
  document.body.appendChild(lb)
}
